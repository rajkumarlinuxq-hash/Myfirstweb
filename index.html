<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIDTOR AI | Rajkumar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --asmani: #00d2ff; --bg: #050811; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        
        /* TOP RIGHT MOTION LOGO */
        .top-right-logo {
            position: fixed; top: 20px; right: 20px;
            width: 60px; height: 60px;
            border: 2px solid var(--asmani);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--asmani);
            animation: rotateLogo 4s linear infinite;
        }
        @keyframes rotateLogo { 100% { transform: rotate(360deg); } }

        .app-container { width: 100%; max-width: 500px; background: #0d1527; padding: 30px; border-radius: 30px; border: 1px solid #1e2a44; text-align: center; }
        h1 { font-weight: 900; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 5px; }
        .stylish-text { font-family: 'Playfair Display', serif; color: var(--asmani); font-style: italic; }
        
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: #1a253d; color: white; }
        button { background: var(--asmani); font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="top-right-logo">AI</div>

<div class="app-container">
    <h1>VIDTOR <span class="stylish-text">AI</span></h1>
    <p>Professional Image to Video Suite</p>

    <input type="file" id="photoInput" style="display:none" onchange="previewImg(this)">
    <button onclick="document.getElementById('photoInput').click()">Upload Image</button>
    <img id="preview" style="width:100px; border-radius:10px; display:none;">

    <input type="text" id="promptInput" placeholder="Enter keywords: vidtor, photo to video, etc...">
    <button id="genBtn" onclick="processVideo()">Generate Magic Video</button>
    <div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/whammy@0.1.1/whammy.min.js"></script>
<script>
    function previewImg(i) {
        const reader = new FileReader();
        reader.onload = e => { document.getElementById('preview').src = e.target.result; document.getElementById('preview').style.display = 'block'; }
        reader.readAsDataURL(i.files[0]);
    }

    function processVideo() {
        const prompt = document.getElementById('promptInput').value.toLowerCase();
        const keywords = ['vidtor', 'photo to video', 'image to video', 'free image to video'];
        
        if (keywords.some(k => prompt.includes(k))) {
            document.getElementById('status').innerText = "Analyzing Request: " + prompt + "... Processing!";
            startAiGeneration();
        } else {
            alert("Please use keywords like 'vidtor' or 'image to video'");
        }
    }

    function startAiGeneration() {
        // Logic vahi hai jo humne pehle set kiya tha, bas ab stylish interface ke saath
        // ... (video generation logic)
        alert("Video generation started by Rajkumar's AI Engine!");
    }
</script>
</body>
</html>
