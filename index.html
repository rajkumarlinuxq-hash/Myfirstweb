<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDTOR | Developed by Rajkumar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: rgb(15, 23, 42); color: rgb(241, 245, 249); padding: 30px 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 35px; }
        h1 { font-size: 42px; font-weight: 800; color: rgb(34, 211, 238); margin-bottom: 5px; letter-spacing: 3px; }
        .creator-name { font-size: 18px; color: rgb(168, 85, 247); font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
        .brand-sub { font-size: 13px; color: rgb(148, 163, 184); font-weight: 500; letter-spacing: 1px; }
        .app-container { max-width: 550px; width: 100%; background: rgb(30, 41, 59); border: 1px solid rgb(71, 85, 105); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); }
        .upload-box { border: 2px dashed rgb(148, 163, 184); border-radius: 16px; padding: 30px 20px; text-align: center; cursor: pointer; background: rgb(15, 23, 42); transition: border-color 0.3s; margin-bottom: 25px; }
        .upload-box:hover { border-color: rgb(34, 211, 238); }
        #fileInput { display: none; }
        .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .preview-img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid rgb(71, 85, 105); }
        .controls-row { margin-bottom: 25px; }
        label { display: block; font-size: 14px; color: rgb(148, 163, 184); margin-bottom: 8px; font-weight: 600; }
        .select-box { width: 100%; padding: 12px; background: rgb(15, 23, 42); border: 1px solid rgb(71, 85, 105); border-radius: 12px; color: white; outline: none; }
        .create-btn { width: 100%; padding: 15px; background: linear-gradient(90deg, rgb(34, 211, 238), rgb(147, 51, 234)); color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 4px 14px rgba(34, 211, 238, 0.3); transition: opacity 0.2s; }
        .create-btn:disabled { background: rgb(71, 85, 105); box-shadow: none; cursor: not-allowed; }
        .status-msg { margin-top: 15px; text-align: center; font-weight: 600; display: none; }
        #videoPreview { width: 100%; border-radius: 14px; margin-top: 25px; display: none; border: 1px solid rgb(71, 85, 105); }
        footer { margin-top: 40px; font-size: 13px; color: rgb(148, 163, 184); text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>VIDTOR</h1>
        <div class="creator-name">By Rajkumar</div>
        <div class="brand-sub">VID-eo + crea-TOR + RAJKUMAR</div>
    </div>
    <div class="app-container">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span style="font-size: 36px;">📸</span>
            <div style="font-weight: 600; margin-top: 10px; color: rgb(203, 213, 225);">Photos Select Karein</div>
            <p style="font-size: 13px; color: rgb(148, 163, 184); margin-top: 4px;">Choose images to compile into MP4</p>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" onchange="handleImages(this)">
        <div class="preview-grid" id="previewGrid"></div>
        <div class="controls-row">
            <label>Timing Adjustment (Per Photo)</label>
            <select id="durationSelect" class="select-box">
                <option value="2000">2 Seconds</option>
                <option value="3000" selected>3 Seconds</option>
                <option value="5000">5 Seconds</option>
            </select>
        </div>
        <button id="actionBtn" class="create-btn" disabled onclick="generateVideo()">Build Video</button>
        <div id="status" class="status-msg"></div>
        <video id="videoPreview" controls></video>
    </div>
    <footer>&copy; 2026 VIDTOR Core Engine. All Rights Reserved.</footer>
    <canvas id="videoCanvas" width="640" height="480" style="display:none;"></canvas>
    <script>
        let uploadedImages = [];
        function handleImages(input) {
            const grid = document.getElementById('previewGrid');
            const btn = document.getElementById('actionBtn');
            grid.innerHTML = ''; uploadedImages = [];
            if (input.files && input.files.length > 0) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = function() {
                            uploadedImages.push(img);
                            const imgDom = document.createElement('img');
                            imgDom.src = e.target.result;
                            imgDom.className = 'preview-img';
                            grid.appendChild(imgDom);
                            if(uploadedImages.length >= 2) { btn.disabled = false; }
                        }
                    }
                    reader.readAsDataURL(file);
                });
            }
        }
        function generateVideo() {
            const canvas = document.getElementById('videoCanvas'); const ctx = canvas.getContext('2d');
            const status = document.getElementById('status'); const videoPlayer = document.getElementById('videoPreview');
            const slideDuration = parseInt(document.getElementById('durationSelect').value);
            status.style.display = 'block'; status.style.color = 'rgb(34, 211, 238)'; status.innerText = '⚙️ Processing frames via VIDTOR Engine...';
            const stream = canvas.captureStream(30); const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); const chunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' }); const videoURL = URL.createObjectURL(blob);
                videoPlayer.src = videoURL; videoPlayer.style.display = 'block'; status.style.color = 'rgb(34, 197, 94)'; status.innerText = '✅ Success! Video compiled by VIDTOR.';
            };
            mediaRecorder.start();
            let currentImgIndex = 0; const totalImages = uploadedImages.length; const framesPerImg = (slideDuration / 1000) * 30; let currentFrameCount = 0;
            const interval = setInterval(() => {
                ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                const img = uploadedImages[currentImgIndex]; const hRatio = canvas.width / img.width; const vRatio = canvas.height / img.height; const ratio = Math.min(hRatio, vRatio);
                const centerShiftX = (canvas.width - img.width * ratio) / 2; const centerShiftY = (canvas.height - img.height * ratio) / 2;
                ctx.drawImage(img, 0, 0, img.width, img.height, centerShiftX, centerShiftY, img.width * ratio, img.height * ratio);
                currentFrameCount++;
                if (currentFrameCount >= framesPerImg) {
                    currentFrameCount = 0; currentImgIndex++;
                    if (currentImgIndex >= totalImages) { clearInterval(interval); mediaRecorder.stop(); }
                }
            }, 1000 / 30);
        }
    </script>
</body>
</html>
