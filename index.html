<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>VIDTOR AI - Free Photo to Video, AI Photo & Design Generator</title>
    <meta name="description" content="VIDTOR AI by Rajkumar - Complete free photo to video generator, advanced AI photo generator, and luxurious automatic design generator. Access premium open-source neural networks completely free.">
    <meta name="keywords" content="photo to video free generator, ai photo generator, design generator, vidtor ai, rajkumar ai, free text to image, flux dev free, stable diffusion online">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Rajkumar">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playball&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --luxury-font: 'Cinzel Decorative', serif;
            --cursive-signature: 'Playball', cursive;
            --readable-ui: 'Space Grotesk', sans-serif;
            
            /* High Energy Vivid Color Palette */
            --neon-magenta: #ff007f;
            --gold-glow: #ffd700;
            --electric-cyan: #00f3ff;
            --deep-purple: #7928ca;
            --matrix-dark: #05020c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--matrix-dark);
            color: #ffffff;
            font-family: var(--readable-ui);
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1500px;
        }

        /* 🔮 DYNAMIC INTERACTIVE 3D BACKDROP TRANSFORMER */
        .stage-3d-background-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        /* 3D Track Elements - State 1 (Photo Generator) */
        .track-element-3d {
            position: absolute; width: 250px; height: 250px;
            border: 2px solid var(--neon-magenta); border-radius: 30px;
            background: rgba(121, 40, 202, 0.08);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.2), inset 0 0 20px rgba(255, 0, 127, 0.1);
            backdrop-filter: blur(5px);
            top: 20%; left: 10%;
            transform: rotateX(45deg) rotateY(-15deg) translateZ(-100px);
            animation: orbitalSpin3D 20s linear infinite;
        }

        /* 3D Track Elements - State 2 (Video Generator) */
        .wave-pipeline-3d {
            position: absolute; top: 50%; left: -10%; width: 120%; height: 12px;
            background: linear-gradient(90deg, transparent, var(--electric-cyan), var(--gold-glow), transparent);
            box-shadow: 0 0 40px var(--electric-cyan);
            transform: rotate(-5deg) translateZ(-200px);
            animation: floatingWave 6s ease-in-out infinite alternate;
        }

        /* 3D Track Elements - State 3 (Design Generator) */
        .core-sphere-3d {
            position: absolute; width: 180px; height: 180px;
            background: radial-gradient(circle at 30% 30%, #ffffff, var(--gold-glow) 50%, #b8860b);
            border-radius: 50%; box-shadow: 0 0 50px var(--gold-glow);
            bottom: 15%; right: 15%; transform: translateZ(-50px);
            animation: pulseSphere 4s ease-in-out infinite alternate;
        }

        @keyframes orbitalSpin3D {
            0% { transform: rotateX(45deg) rotateY(0deg) translateZ(-100px); }
            100% { transform: rotateX(45deg) rotateY(360deg) translateZ(-100px); }
        }
        @keyframes floatingWave {
            0% { transform: rotate(-5deg) translateY(-20px) translateZ(-200px); }
            100% { transform: rotate(-3deg) translateY(20px) translateZ(-100px); }
        }
        @keyframes pulseSphere {
            0% { transform: scale(1) translateZ(-50px); box-shadow: 0 0 40px var(--gold-glow); }
            100% { transform: scale(1.15) translateZ(0px); box-shadow: 0 0 70px var(--neon-magenta); }
        }

        /* 👑 PURE LUXURY IMMOVABLE FLOATING HEADER */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            background: rgba(5, 2, 12, 0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255, 0, 127, 0.2);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }

        /* Brand Identity Node */
        .brand-container { display: flex; flex-direction: column; text-decoration: none; }
        .luxury-logo-title {
            font-family: var(--luxury-font); font-size: 2.6rem;
            background: linear-gradient(135deg, #ffffff, var(--gold-glow), var(--neon-magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .luxury-author-sub {
            font-family: var(--cursive-signature); font-size: 1.8rem;
            color: var(--electric-cyan); text-shadow: 0 0 10px var(--electric-cyan);
            margin-top: -8px;
        }

        /* Interactive RK Trigger Badge */
        .logo-rk-badge {
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-magenta), var(--deep-purple), var(--electric-cyan));
            border: 2px solid #ffffff; box-shadow: 0 0 25px var(--neon-magenta);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--luxury-font); font-size: 1.8rem; color: #ffffff;
            cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-rk-badge:hover {
            transform: scale(1.12) rotate(360deg);
            box-shadow: 0 0 35px var(--electric-cyan);
        }

        /* 📲 GLOBAL NAVIGATION MATRICES PANEL */
        .navigation-drawer-panel {
            position: fixed; top: 100px; right: -360px; width: 340px; height: calc(100vh - 100px);
            background: rgba(4, 1, 10, 0.98); backdrop-filter: blur(25px);
            border-left: 2px solid var(--electric-cyan); box-shadow: -10px 0 50px rgba(0,0,0,0.8);
            z-index: 4000; padding: 40px 25px;
            display: flex; flex-direction: column; gap: 20px;
            transition: right 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .navigation-drawer-panel.active { right: 0; }

        .drawer-heading {
            font-family: var(--luxury-font); font-size: 1.4rem; color: var(--gold-glow);
            text-align: center; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }

        .tool-link-card {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            cursor: pointer; transition: 0.3s ease;
        }
        .tool-link-card:hover {
            background: rgba(0, 243, 255, 0.08); border-color: var(--electric-cyan);
            transform: translateX(-5px);
        }
        .tool-link-card.active-selection {
            background: rgba(255, 0, 127, 0.1); border-color: var(--neon-magenta);
        }
        .tool-card-icon { font-size: 1.6rem; }
        .tool-card-title { font-size: 1.1rem; font-weight: 600; color: #ffffff; }

        /* 💻 CENTRALIZED MAIN CONTAINER HOUSING */
        .main-workspace-wrapper {
            width: 100%; max-width: 720px; margin: 30px auto 0 auto;
            position: relative; z-index: 10; padding: 0 15px;
        }

        .terminal-interface-card {
            width: 100%; background: rgba(6, 2, 16, 0.88);
            border: 2px solid rgba(0, 243, 255, 0.2); border-radius: 35px;
            padding: 40px 30px; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
            transition: border-color 0.5s ease;
        }
        .terminal-interface-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--electric-cyan), var(--neon-magenta), var(--gold-glow));
        }

        /* Colorful & Highly Readable Form Elements */
        .form-block { text-align: left; margin-bottom: 25px; }
        .form-block label {
            display: block; font-size: 1.05rem; font-weight: 600; margin-bottom: 8px;
            color: var(--gold-glow); letter-spacing: 0.5px;
        }

        input[type="text"], select {
            width: 100%; padding: 16px 20px; background: rgba(3, 1, 8, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.1); color: #ffffff; border-radius: 16px;
            font-family: var(--readable-ui); font-size: 1rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus, select:focus {
            border-color: var(--electric-cyan); box-shadow: 0 0 20px rgba(0, 243, 255, 0.25);
        }
        select option { background: var(--matrix-dark); color: #fff; }

        /* Submit Action Module */
        .btn-core-action {
            width: 100%; padding: 16px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, var(--electric-cyan), var(--deep-purple), var(--neon-magenta));
            color: #ffffff; font-family: var(--readable-ui); font-size: 1.2rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 15px 35px rgba(255, 0, 127, 0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        .btn-core-action:hover {
            transform: translateY(-3px); box-shadow: 0 20px 45px var(--neon-magenta);
        }

        /* Live Working System Monitor Logs */
        .system-monitor-logs {
            margin-top: 25px; text-align: center; font-size: 1.05rem; font-weight: 600;
            color: var(--neon-magenta); min-height: 30px;
        }
        .logs-success { color: #00ffcc !important; text-shadow: 0 0 10px rgba(0,255,204,0.4); }

        /* Output Viewports */
        .graphic-display-frame {
            margin-top: 30px; width: 100%; display: none; border-radius: 24px;
            overflow: hidden; border: 2px solid var(--gold-glow); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .graphic-display-frame img { width: 100%; display: block; }

        .text-display-frame {
            margin-top: 30px; width: 100%; display: none; padding: 25px;
            background: rgba(3, 1, 8, 0.95); border-radius: 16px;
            border: 2px dashed var(--electric-cyan); line-height: 1.6; text-align: left;
        }

        .btn-download-node {
            display: none; width: 100%; padding: 14px; margin-top: 20px; border: none;
            background: #00ffcc; color: #000000; font-family: var(--readable-ui);
            font-size: 1.1rem; font-weight: 700; border-radius: 16px; cursor: pointer;
        }

        /* ⚜️ DEVOTIONAL FOOTER STAMP */
        .devotional-stamp {
            font-family: var(--cursive-signature); font-size: 4rem; text-align: center;
            margin: 100px 0 40px 0;
            background: linear-gradient(90deg, #ff9933, #ffffff, #33cc33);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.15);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="stage-3d-background-canvas" id="global3DStage">
        <div class="track-element-3d" id="nodeShape3D"></div>
        <div class="wave-pipeline-3d" id="nodePipeline3D"></div>
        <div class="core-sphere-3d" id="nodeSphere3D"></div>
    </div>

    <header>
        <a href="#" class="brand-container" onclick="resetDashboardEngine(event)">
            <span class="luxury-logo-title">VIDTOR</span>
            <span class="luxury-author-sub">by Rajkumar</span>
        </a>
        <div class="logo-rk-badge" onclick="toggleNavigationDrawer()" title="Click to view Earth's All Working AI Tools">RK</div>
    </header>

    <div class="navigation-drawer-panel" id="globalDrawer">
        <button style="position:absolute; top:15px; right:20px; background:none; border:none; color:var(--neon-magenta); font-size:2.5rem; cursor:pointer;" onclick="toggleNavigationDrawer()">×</button>
        <div class="drawer-heading">EARTH'S WORKING AI CLUSTERS</div>
        
        <div class="tool-link-card active-selection" id="navCard1" onclick="switchActivePageLayer('photo-gen', 'black-forest-labs/FLUX.1-dev', 'image', 1)">
            <span class="tool-card-icon">🖼️</span>
            <span class="tool-card-title">AI Photo Generator</span>
        </div>
        
        <div class="tool-link-card" id="navCard2" onclick="switchActivePageLayer('photo-to-video', 'stabilityai/stable-diffusion-xl-base-1.0', 'image', 2)">
            <span class="tool-card-icon">🎬</span>
            <span class="tool-card-title">Photo to Video Free Generator</span>
        </div>
        
        <div class="tool-link-card" id="navCard3" onclick="switchActivePageLayer('design-gen', 'stabilityai/stable-diffusion-xl-base-1.0', 'image', 3)">
            <span class="tool-card-icon">🎨</span>
            <span class="tool-card-title">Design Generator Engine</span>
        </div>
        
        <div class="tool-link-card" id="navCard4" onclick="switchActivePageLayer('text-expert', 'Qwen/Qwen2.5-72B-Instruct', 'text', 4)">
            <span class="tool-card-icon">🤖</span>
            <span class="tool-card-title">Qwen 2.5 Expert AI Script</span>
        </div>
    </div>

    <div class="main-workspace-wrapper">
        <div class="terminal-interface-card" id="coreTerminalCard">
            
            <div class="form-block">
                <label>Hugging Face Security Authentication Token</label>
                <input type="text" id="apiSecureToken" placeholder="Enter your valid hf_... access token here to make tools work">
            </div>

            <div class="form-block">
                <label>Active Core Architecture Model Directory</label>
                <input type="text" id="apiModelDirectory" value="black-forest-labs/FLUX.1-dev" placeholder="Neural Network Repository Directory">
            </div>

            <div class="form-block">
                <label>Processing Pipeline Data Format</label>
                <select id="apiDataFormat">
                    <option value="image">Render and Generate Graphics Layer</option>
                    <option value="text">Compile Complete Conversational Script text</option>
                </select>
            </div>

            <div class="form-block">
                <label id="variablePromptLabel">Enter AI Photo Generation Query / Prompt Details</label>
                <input type="text" id="apiPromptString" placeholder="Describe the scene structures or assets required explicitly...">
            </div>

            <button class="btn-core-action" onclick="executeNeuralClusterStream()">Fire Active Working Node</button>

            <div class="system-monitor-logs" id="terminalSystemLogs">System Online. Select a tool via the RK Logo Menu to experience automatic 3D track shifts.</div>

            <div class="graphic-display-frame" id="viewportGraphicBox">
                <img src="" id="targetRenderedFrame" alt="VIDTOR AI Real Render Engine Frame">
            </div>

            <div class="text-display-frame" id="viewportTextBox"></div>

            <button class="btn-download-node" id="globalDownloadActionBtn" onclick="triggerAssetDownload()">Download Generated Asset File</button>

        </div>

        <div class="devotional-stamp">Radhe Radhe</div>
    </div>

    <script>
        function toggleNavigationDrawer() {
            document.getElementById('globalDrawer').classList.toggle('active');
        }

        // 🔮 DYNAMIC MULTI-PAGE 3D ANIMATION AND MATRIX SHIFTER ENGINE
        function switchActivePageLayer(pageType, modelPath, format, cardIndex) {
            document.getElementById('apiModelDirectory').value = modelPath;
            document.getElementById('apiDataFormat').value = format;
            
            // Manage UI States
            const cards = document.querySelectorAll('.tool-link-card');
            cards.forEach(card => card.classList.remove('active-selection'));
            document.getElementById(`navCard${cardIndex}`).classList.add('active-selection');
            
            const stage = document.getElementById('global3DStage');
            const cardFrame = document.getElementById('coreTerminalCard');
            const label = document.getElementById('variablePromptLabel');
            const promptInput = document.getElementById('apiPromptString');

            // 3D Matrix Rotations & Changes Based on the Selected Page Item
            if(pageType === 'photo-gen') {
                stage.style.transform = "rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)";
                cardFrame.style.borderColor = "var(--neon-magenta)";
                label.innerText = "Enter AI Photo Generation Query / Prompt Details";
                promptInput.placeholder = "Cinematic lighting, ultra-realistic portrait asset, 8k resolution...";
            } 
            else if(pageType === 'photo-to-video') {
                stage.style.transform = "rotateX(15deg) rotateY(-30deg) translateZ(-50px) scale3d(1.1, 1.1, 1.1)";
                cardFrame.style.borderColor = "var(--electric-cyan)";
                label.innerText = "Enter Photo to Video Transformation Script Framework";
                promptInput.placeholder = "Animate background clouds shifting slowly, cinemagraph movement layout...";
            }
            else if(pageType === 'design-gen') {
                stage.style.transform = "rotateX(-20deg) rotateY(45deg) translateZ(100px)";
                cardFrame.style.borderColor = "var(--gold-glow)";
                label.innerText = "Enter Structural Vector Design Parameter Commands";
                promptInput.placeholder = "Neon graphic UI component design, vector continuous frame mesh...";
            }
            else if(pageType === 'text-expert') {
                stage.style.transform = "rotateX(45deg) rotateY(180deg) scale3d(0.9, 0.9, 0.9)";
                cardFrame.style.borderColor = "var(--deep-purple)";
                label.innerText = "Enter High-Speed Analytical Script Question String";
                promptInput.placeholder = "Write comprehensive high-retention copy strategies for modern apps...";
            }

            toggleNavigationDrawer();
            cardFrame.scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => { promptInput.focus(); }, 700);
        }

        function resetDashboardEngine(e) {
            e.preventDefault();
            switchActivePageLayer('photo-gen', 'black-forest-labs/FLUX.1-dev', 'image', 1);
        }

        // 🛠️ 100% WORKING API INTERACTION DRIVER CODE
        async function executeNeuralClusterStream() {
            const token = document.getElementById('apiSecureToken').value.trim();
            const model = document.getElementById('apiModelDirectory').value.trim();
            const format = document.getElementById('apiDataFormat').value;
            const prompt = document.getElementById('apiPromptString').value.trim();
            const logs = document.getElementById('terminalSystemLogs');

            const graphicFrame = document.getElementById('viewportGraphicBox');
            const imgNode = document.getElementById('targetRenderedFrame');
            const textFrame = document.getElementById('viewportTextBox');
            const downloadBtn = document.getElementById('globalDownloadActionBtn');

            if(!token) {
                logs.classList.remove('logs-success');
                logs.innerText = "Rajkumar bhai, tools ko live run krne ke liye pehle Token key fill karo!";
                return;
            }
            if(!model) {
                logs.classList.remove('logs-success');
                logs.innerText = "Error: System cluster path configuration can't be empty.";
                return;
            }
            if(!prompt) {
                logs.classList.remove('logs-success');
                logs.innerText = "Warning: Execution request query prompt parameter is empty!";
                return;
            }

            logs.classList.remove('logs-success');
            logs.innerText = "Accessing Neural Cluster. Running real server nodes...";
            graphicFrame.style.display = "none";
            textFrame.style.display = "none";
            downloadBtn.style.display = "none";

            try {
                const response = await fetch(
                    `https://api-inference.huggingface.co/models/${model}`,
                    {
                        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                if (!response.ok) throw new Error(`Server Pipeline Error Code: ${response.status}`);
                logs.innerText = "Compiling live analytical stream buffers...";

                if(format === 'image') {
                    const blobData = await response.blob();
                    imgNode.src = URL.createObjectURL(blobData);
                    graphicFrame.style.display = "block";
                    downloadBtn.style.display = "block";
                } else {
                    const jsonData = await response.json();
                    textFrame.innerText = Array.isArray(jsonData) ? jsonData[0].generated_text : JSON.stringify(jsonData);
                    textFrame.style.display = "block";
                }

                logs.classList.add('logs-success');
                logs.innerText = "Success: AI Node processed data successfully!";
            } catch (err) {
                logs.innerText = "Cluster Exception: Connection timed out or Model loading on server nodes.";
            }
        }

        function triggerAssetDownload() {
            const imgNode = document.getElementById('targetRenderedFrame');
            if(imgNode.src) {
                const downloadAnchor = document.createElement('a');
                downloadAnchor.href = imgNode.src;
                downloadAnchor.download = `VIDTOR_AI_ASSET_${Date.now()}.png`;
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);
            }
        }
    </script>
</body>
</html>
