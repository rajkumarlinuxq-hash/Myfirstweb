<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>VIDTOR AI - The Global 100+ AI Models Matrix Suite | By Rajkumar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Orbitron:wght@800;900&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff007f;
            --neon-purple: #9d4edd;
            --dark-space: #020208;
            --glass: rgba(12, 12, 28, 0.85);
            --border: rgba(0, 240, 255, 0.25);
        }

        body {
            margin: 0; padding: 110px 20px 40px 20px; box-sizing: border-box;
            background-color: var(--dark-space); color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* 🌈 EXTREME NEON COLOR LIQUID LIQUID MATRIX */
        body::before {
            content: ""; position: absolute; top: -30%; left: -30%; width: 160%; height: 160%;
            background: radial-gradient(circle at 20% 20%, rgba(0, 240, 255, 0.2) 0%, transparent 45%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 127, 0.2) 0%, transparent 45%),
                        radial-gradient(circle at 50% 50%, rgba(157, 78, 221, 0.15) 0%, transparent 50%);
            z-index: -2; animation: fluidLaserGlow 12s ease-in-out infinite alternate;
        }
        @keyframes fluidLaserGlow {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, -5%) rotate(6deg); }
        }

        /* --- GLOBAL HEADER BLOCK --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 85px;
            background: rgba(2, 2, 8, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 2px solid var(--border);
            display: flex; align-items: center; justify-content: flex-start;
            padding: 0 30px; box-sizing: border-box; z-index: 1000;
            box-shadow: 0 5px 30px rgba(0, 240, 255, 0.2);
        }
        .rk-brand-block { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .rk-spinning-logo {
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 16px;
            border: 2px solid #fff; box-shadow: 0 0 20px var(--neon-cyan);
            animation: coreSpin 7s linear infinite;
        }
        @keyframes coreSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .anti-spin { animation: stabilize 7s linear infinite; }
        @keyframes stabilize { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        
        .meta-text-stack { display: flex; flex-direction: column; }
        .title-logo-text { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(to right, #fff, var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .author-tag { font-size: 0.78rem; font-weight: 800; color: #ffbc00; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

        .workspace-container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 20px; }
        .hub-title { font-family: 'Orbitron', sans-serif; font-size: 2.3rem; font-weight: 900; text-align: center; margin: 0; background: linear-gradient(to right, var(--neon-cyan), #fff, var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hub-subtitle { font-size: 0.95rem; opacity: 0.8; text-align: center; margin-top: -10px; max-width: 700px; }

        /* --- THE ULTIMATE MASTER PANEL --- */
        .master-engine-panel {
            width: 100%; max-width: 650px; background: var(--glass);
            border: 2px solid var(--border); border-radius: 28px; padding: 35px;
            box-sizing: border-box; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .control-block { text-align: left; margin-top: 20px; width: 100%; }
        label { font-size: 0.82rem; font-weight: 700; color: var(--neon-cyan); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input[type="text"], select {
            width: 100%; padding: 15px; background: rgba(2,2,8,0.9);
            border: 2px solid var(--border); color: #fff; border-radius: 12px;
            font-family: inherit; font-size: 0.95rem; outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input[type="text"]:focus, select:focus { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,127,0.3); }

        /* Quick Model Selection Grid Tags */
        .model-tags-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .model-tag { padding: 6px 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; font-size: 0.78rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .model-tag:hover { background: var(--neon-pink); border-color: transparent; color: #fff; }

        .btn-execute {
            width: 100%; padding: 18px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 800;
            cursor: pointer; margin-top: 30px; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s;
        }
        .btn-execute:hover { transform: translateY(-2px); box-shadow: 0 5px 25px var(--neon-pink); }

        .engine-logs { margin-top: 20px; font-size: 0.95rem; color: var(--neon-pink); font-weight: bold; min-height: 25px; text-shadow: 0 0 8px rgba(255,0,127,0.3); }
        .success-logs { color: #00ffcc !important; text-shadow: 0 0 8px rgba(0,255,204,0.4); }

        /* OUTPUT CONTAINERS */
        .output-media-box { margin-top: 25px; width: 100%; display: none; border-radius: 16px; overflow: hidden; border: 2px solid var(--neon-cyan); }
        .output-media-box img, .output-media-box video { width: 100%; display: block; }
        .output-text-box { margin-top: 25px; width: 100%; display: none; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 12px; border: 1px solid var(--neon-purple); text-align: left; font-size: 0.95rem; line-height: 1.6; }

        .btn-download { display: none; width: 100%; padding: 14px; margin-top: 15px; border: none; background: #00ffcc; color: #020208; font-family: 'Orbitron', sans-serif; font-weight: 800; border-radius: 10px; cursor: pointer; text-transform: uppercase; }

        .devotional-signature { font-family: 'Cinzel', serif; font-size: 1.5rem; margin-top: 45px; background: linear-gradient(to right, #ff9933, #ffffff, #ff9933); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 5px; font-weight: 900; }
    </style>
</head>
<body>

    <header>
        <div class="rk-brand-block" onclick="window.location.reload()">
            <div class="rk-spinning-logo"><div class="anti-spin">RK</div></div>
            <div class="meta-text-stack">
                <span class="title-logo-text">VIDTOR AI</span>
                <span class="author-tag">by Rajkumar</span>
            </div>
        </div>
    </header>

    <div class="workspace-container">
        <h1 class="hub-title">Duniya Ke Saare AI Tools Hub</h1>
        <p class="hub-subtitle">Access any of the world's 100+ trending open-source generative AI neural models instantly from one dynamic control deck.</p>

        <div class="master-engine-panel">
            
            <div class="control-block">
                <label>1. Enter Hugging Face Access Token:</label>
                <input type="text" id="globalHfToken" placeholder="Paste your hf_... key here">
            </div>

            <div class="control-block">
                <label>2. Choose or Search Any World AI Model Layer:</label>
                <input type="text" id="targetAiModelPath" placeholder="e.g., black-forest-labs/FLUX.1-dev" value="black-forest-labs/FLUX.1-dev">
                
                <div class="model-tags-grid">
                    <span class="model-tag" onclick="selectModel('black-forest-labs/FLUX.1-dev', 'image')">🔥 FLUX.1 (Real Photo)</span>
                    <span class="model-tag" onclick="selectModel('stabilityai/stable-diffusion-xl-base-1.0', 'image')">🎨 Stable Diffusion XL</span>
                    <span class="model-tag" onclick="selectModel('Qwen/Qwen2.5-72B-Instruct', 'text')">🤖 Qwen 2.5 (Smart Chat)</span>
                    <span class="model-tag" onclick="selectModel('meta-llama/Llama-3.1-8B-Instruct', 'text')">💬 Llama 3.1 AI</span>
                    <span class="model-tag" onclick="selectModel('stabilityai/stable-video-diffusion-img2vid-xt', 'video')">🎬 Image-To-Video AI</span>
                </div>
            </div>

            <div class="control-block">
                <label>3. Model Processing Output Type:</label>
                <select id="modelProcessingType">
                    <option value="image">Generates Image / Art Output</option>
                    <option value="text">Generates Text / Code Output</option>
                </select>
            </div>

            <div class="control-block">
                <label>4. Your Custom Prompt / Command Input:</label>
                <input type="text" id="globalUserPrompt" placeholder="Type what you want the selected world AI to do...">
            </div>

            <button class="btn-execute" onclick="executeGlobalNeuralMatrixPipeline()">Fire Selected AI Model</button>

            <div class="engine-logs" id="globalEngineConsole"></div>

            <div class="output-media-box" id="globalMediaOutputWrapper">
                <img src="" id="finalImgFrame" style="display:none;">
                <video id="finalVideoFrame" controls style="display:none;"></video>
            </div>
            <div class="output-text-box" id="globalTextOutputWrapper"></div>
            
            <button class="btn-download" id="globalDownloadBtn" onclick="downloadMasterOutputAsset()">⬇️ Download Output File</button>

        </div>
    </div>

    <div class="devotional-signature">RADHE RADHE</div>

    <script>
        function selectModel(path, type) {
            document.getElementById('targetAiModelPath').value = path;
            document.getElementById('modelProcessingType').value = type;
        }

        async function executeGlobalNeuralMatrixPipeline() {
            const token = document.getElementById('globalHfToken').value.trim();
            const modelPath = document.getElementById('targetAiModelPath').value.trim();
            const processType = document.getElementById('modelProcessingType').value;
            const prompt = document.getElementById('globalUserPrompt').value.trim();
            const logs = document.getElementById('globalEngineConsole');
            
            const mediaWrapper = document.getElementById('globalMediaOutputWrapper');
            const imgFrame = document.getElementById('finalImgFrame');
            const videoFrame = document.getElementById('finalVideoFrame');
            const textWrapper = document.getElementById('globalTextOutputWrapper');
            const downloadBtn = document.getElementById('globalDownloadBtn');

            if(!token) { alert("Rajkumar bhai, pehle Token paste kro!"); return; }
            if(!modelPath) { alert("Rajkumar bhai, AI Model path select kro!"); return; }
            if(!prompt) { alert("Rajkumar bhai, Prompt commands khali mat rkho!"); return; }

            // Resetting displays
            logs.classList.remove('success-logs');
            logs.innerText = `⚡ Booting Stream Node Pipeline for [${modelPath}]...`;
            mediaWrapper.style.display = "none";
            imgFrame.style.display = "none";
            videoFrame.style.display = "none";
            textWrapper.style.display = "none";
            downloadBtn.style.display = "none";

            try {
                // UNIVERSAL FETCH GATEWAY ROUTING SYSTEM
                const response = await fetch(
                    `https://api-inference.huggingface.co/models/${modelPath}`,
                    {
                        headers: { 
                            "Authorization": `Bearer ${token}`,
                            "Content-Type": "application/json"
                        },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                if (!response.ok) {
                    throw new Error(`Target AI Server returned structural anomaly code: ${response.status}`);
                }

                logs.innerText = "⏳ Processing completed. Analyzing output data arrays...";

                if(processType === 'image') {
                    const blobData = await response.blob();
                    const objectUrl = URL.createObjectURL(blobData);
                    imgFrame.src = objectUrl;
                    imgFrame.style.display = "block";
                    mediaWrapper.style.display = "block";
                    downloadBtn.style.display = "block";
                } 
                else if (processType === 'text') {
                    const textJson = await response.json();
                    let generatedTextString = "";
                    if(Array.isArray(textJson) && textJson[0].generated_text) {
                        generatedTextString = textJson[0].generated_text;
                    } else {
                        generatedTextString = JSON.stringify(textJson);
                    }
                    textWrapper.innerText = generatedTextString;
                    textWrapper.style.display = "block";
                }

                logs.classList.add('success-logs');
                logs.innerText = "🎉 Success: Real AI Neural Request Executed Safely!";

            } catch (error) {
                console.log(error);
                logs.innerText = "❌ Halted: Target model is sleeping or Token has invalid credentials.";
                alert("Rajkumar bhai check karo: Model path sahi hai ya nahi, ya token active hai ya nahi!");
            }
        }

        function downloadMasterOutputAsset() {
            const img = document.getElementById('finalImgFrame');
            if(img.src) {
                const a = document.createElement('a');
                a.href = img.src;
                a.download = `VIDTOR_WORLD_AI_ASSET_${Date.now()}.png`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            }
        }
    </script>
</body>
</html>
