<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDTOR AI | BY RAJKUMAR</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@1,700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --asmani: #00d2ff;
            --purple: #9d4edd;
            --bg: #050811;
            --card: #0d1527;
            --text: #f3f4f6;
        }

        body {
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- TOP RIGHT LIVE LOGO ENGINE WITH 'RK' CENTER --- */
        .top-right-logo-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .siri-pulse-asmani {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--asmani), #00f0ff, var(--purple));
            filter: blur(10px);
            opacity: 0.8;
            animation: siri-wave 2.5s ease-in-out infinite alternate;
        }

        .siri-pulse-asmani-2 {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(225deg, #00ffcc, var(--purple), var(--asmani));
            filter: blur(15px);
            opacity: 0.5;
            animation: siri-wave 1.8s ease-in-out infinite alternate-reverse;
        }

        /* RK Short Name Core Box */
        .rk-core {
            position: absolute;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(13, 21, 39, 0.85);
            backdrop-filter: blur(5px);
            border: 2px solid var(--asmani);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.5px;
            z-index: 5;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            animation: core-bounce 3s ease-in-out infinite alternate;
        }

        @keyframes siri-wave {
            0% {
                transform: scale(0.95) rotate(0deg);
                border-radius: 40% 60% 50% 50% / 50% 40% 60% 50%;
            }
            50% {
                transform: scale(1.12) rotate(180deg);
                border-radius: 60% 40% 60% 40% / 40% 60% 40% 60%;
            }
            100% {
                transform: scale(0.98) rotate(360deg);
                border-radius: 40% 60% 40% 50% / 50% 50% 50% 40%;
            }
        }

        @keyframes core-bounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); filter: drop-shadow(0 0 5px var(--asmani)); }
        }

        /* --- APP MAIN INTERFACE --- */
        .app-container {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            padding: 35px 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 900;
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .stylish-text {
            font-family: 'Playfair Display', serif;
            color: var(--asmani);
            font-style: italic;
            font-weight: 700;
        }

        .author {
            color: var(--purple);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 5px;
            margin-bottom: 30px;
        }

        /* 1. STYLISH UPLOAD BOX */
        .upload-box {
            border: 2px dashed rgba(0, 210, 255, 0.25);
            padding: 30px 20px;
            border-radius: 18px;
            cursor: pointer;
            background: rgba(0, 210, 255, 0.01);
            transition: 0.3s;
            margin-bottom: 25px;
        }

        .upload-box:hover {
            border-color: var(--asmani);
            background: rgba(0, 210, 255, 0.04);
        }

        .upload-icon {
            font-size: 38px;
            margin-bottom: 10px;
        }

        #preview-box {
            margin-bottom: 20px;
        }

        .preview-img {
            width: 95px;
            height: 95px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid var(--asmani);
        }

        /* 2. SEARCH & PROMPT ENGINE BOX */
        .field-group {
            text-align: left;
            margin-top: 18px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--asmani);
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px;
            background: #050811;
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--asmani);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* 3. GENERATOR BOX */
        .generate-box {
            margin-top: 30px;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--asmani), var(--purple));
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 210, 255, 0.45);
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #00ffcc;
            font-weight: bold;
        }

        .footer-branding {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            margin-top: 30px;
            background: linear-gradient(to right, #ff9933, #ffffff, #ff9933);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            opacity: 0.9;
            filter: drop-shadow(0 0 5px rgba(255, 153, 51, 0.3));
        }
    </style>
</head>
<body>

<!-- TOP RIGHT MOTION LOGO (ASMANI GLOW + RK CORE) -->
<div class="top-right-logo-container">
    <div class="siri-pulse-asmani"></div>
    <div class="siri-pulse-asmani-2"></div>
    <div class="rk-core">RK</div>
</div>

<div class="app-container">
    <h1>VIDTOR <span class="stylish-text">AI</span></h1>
    <div class="author">BY RAJKUMAR</div>

    <!-- PHOTO UPLOAD BOX -->
    <div class="upload-box" onclick="document.getElementById('photoInput').click()">
        <div class="upload-icon">📸</div>
        <div style="font-weight: 600; font-size: 0.95rem;">Upload Photo/Image Here</div>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="loadPhoto(this)">
    </div>

    <div id="preview-box"></div>

    <!-- AI PROMPT SEARCH ENGINE BOX -->
    <div class="field-group">
        <label>🔍 AI Search & Prompt Box:</label>
        <input type="text" id="promptInput" placeholder="vidtor, photo to video, image to video...">
    </div>

    <!-- Video Length Selection -->
    <div class="field-group">
        <label>⏱️ Video Length:</label>
        <select id="durationInput">
            <option value="4" selected>4 Seconds</option>
            <option value="7">7 Seconds</option>
        </select>
    </div>

    <!-- GENERATOR BOX -->
    <div class="generate-box">
        <button class="btn-generate" onclick="verifyAndGenerate()">Generate AI Video</button>
        <div class="status-msg" id="statusLabel"></div>
    </div>
</div>

<!-- Footer Radhe Radhe Text -->
<div class="footer-branding">
    RADHE RADHE
</div>

<!-- Whammy Video Compiler Component -->
<script src="https://cdn.jsdelivr.net/npm/whammy@0.1.1/whammy.min.js"></script>
<script>
    let uploadedImgData = null;

    function loadPhoto(input) {
        const preview = document.getElementById('preview-box');
        preview.innerHTML = '';
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImgData = e.target.result;
                const img = document.createElement('img');
                img.src = e.target.result;
                img.classList.add('preview-img');
                preview.appendChild(img);
                document.getElementById('statusLabel').innerText = "Image Loaded Successfully!";
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Smart Search Engine Verification Logic
    function verifyAndGenerate() {
        if (!uploadedImgData) {
            alert('Rajkumar bhai, pehle photo upload karo!');
            return;
        }

        const promptText = document.getElementById('promptInput').value.toLowerCase().trim();
        
        // Match conditions requested by user
        const allowedKeywords = [
            'vidtor', 
            'photo to video', 
            'image to video', 
            'free image to video', 
            'free photo to video'
        ];

        // Validation Check
        const isMatch = allowedKeywords.some(keyword => promptText.includes(keyword));

        if (promptText === "" || !isMatch) {
            alert("Rajkumar bhai, search box me inme se koi ek keyword likho:\n• vidtor\n• photo to video\n• image to video\n• free image to video\n• free photo to video");
            return;
        }

        // Trigger Video Creation Engine
        startAiGeneration(promptText);
    }

    function startAiGeneration(promptText) {
        const statusLabel = document.getElementById('statusLabel');
        statusLabel.innerText = '⚡ VIDTOR AI Engine Processing...';

        const duration = parseInt(document.getElementById('durationInput').value);
        const fps = 12;
        const totalFrames = duration * fps;
        const video = new Whammy.Video(fps);
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1280;
        canvas.height = 720;
        
        const mainImg = new Image();
        mainImg.src = uploadedImgData;
        
        mainImg.onload = function() {
            const textFramesCount = Math.floor(1.5 * fps); 
            const motionFramesCount = totalFrames - textFramesCount;

            // Part 1: Video Motion + Continuous Corner Watermark Water-Wave Logo
            for (let i = 0; i < motionFramesCount; i++) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let progress = i / motionFramesCount;
                
                let zoom = 1.0 + (progress * 0.16); 
                let moveX = 0;
                
                if (promptText.includes('left')) moveX = -progress * 60;
                if (promptText.includes('right')) moveX = progress * 60;

                ctx.save();
                ctx.translate(canvas.width / 2 + moveX, canvas.height / 2);
                ctx.scale(zoom, zoom);
                
                let scale = Math.max(canvas.width / mainImg.width, canvas.height / mainImg.height);
                let w = mainImg.width * scale;
                let h = mainImg.height * scale;
                ctx.drawImage(mainImg, -w/2, -h/2, w, h);
                ctx.restore();
                
                // Continuous Floating Corner Watermark Sign
                ctx.save();
                let logoYOffset = Math.sin(i * 0.4) * 7; 
                ctx.font = "bold 24px 'Outfit', sans-serif";
                ctx.textAlign = "right";
                ctx.fillStyle = "rgba(0, 210, 255, 0.85)";
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowBlur = 4;
                ctx.fillText("⚡ VIDTOR AI", canvas.width - 40, 50 + logoYOffset);
                ctx.restore();
                
                video.add(canvas);
            }

            // Part 2: END SCREEN OUTRO - CINZEL CELESTIAL RADHE RADHE
            for (let j = 0; j < textFramesCount; j++) {
                ctx.fillStyle = "#050811";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.font = "bold 80px 'Cinzel', serif";
                ctx.textAlign = "center";
                
                let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, "#ff9933");
                gradient.addColorStop(0.5, "#ffffff");
                gradient.addColorStop(1, "#ff9933");
                ctx.fillStyle = gradient;
                
                let alpha = Math.min(j / (fps * 0.5), 1);
                ctx.globalAlpha = alpha;
                
                ctx.fillText("RADHE RADHE", canvas.width / 2, canvas.height / 2 + 25);
                ctx.globalAlpha = 1.0; 
                
                video.add(canvas);
            }

            // Compile & Build
            const outputVideo = video.compile();
            const outputUrl = URL.createObjectURL(outputVideo);
            
            statusLabel.innerText = '🎉 Video Downloaded Successfully!';
            
            const downloader = document.createElement('a');
            downloader.href = outputUrl;
            downloader.download = `VIDTOR_AI_RK_${Date.now()}.webm`;
            document.body.appendChild(downloader);
            downloader.click();
            document.body.removeChild(downloader);
        }
    }
</script>

</body>
</html>
