<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDTOR AI - Morphing 3D Premium Matrix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Great+Vibes&family=Monsieur+La+Doulaise&family=Parisienne&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-cursive: 'Great Vibes', cursive;
            --accent-cursive: 'Alex Brush', cursive;
            --extreme-cursive: 'Pinyon Script', cursive;
            --royal-cursive: 'Parisienne', cursive;
            --gold-glow: #ffd700;
            --neon-magenta: #ff007f;
            --deep-violet: #0a0518;
            --fluid-gradient: linear-gradient(135deg, #ff007f, #7928ca, #0070f3);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 130px 15px 60px 15px;
            background-color: var(--deep-violet);
            color: #ffffff;
            font-family: var(--royal-cursive), sans-serif;
            font-size: 1.4rem; letter-spacing: 1px;
            min-height: 200vh; overflow-x: hidden; position: relative;
        }

        /* 🌌 GLOBAL CINEMATIC BACKDROP LAYER */
        body::before {
            content: ""; position: fixed; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at 50% 30%, rgba(121, 40, 202, 0.22) 0%, transparent 60%),
                        radial-gradient(circle at 10% 80%, rgba(255, 0, 127, 0.15) 0%, transparent 50%);
            z-index: -5; pointer-events: none;
        }

        /* 🔮 YOUTUBE EXACT 3D MORPHING GEOMETRIC TRACK STAGE */
        .cinematic-3d-pipeline-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none; perspective: 1200px; overflow: hidden;
        }

        /* Continuous Wavy Track Line */
        .morphing-wavy-track {
            position: absolute; top: 45%; left: -10%; width: 120%; height: 8px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), var(--gold-glow), rgba(255,0,127,0.4), transparent);
            box-shadow: 0 0 25px var(--gold-glow), 0 0 40px var(--neon-magenta);
            transform: rotate(-4deg) cubic-bezier(0.4, 0, 0.2, 1);
            animation: infiniteTrackWave 8s ease-in-out infinite alternate;
        }

        /* Exact Gold Ball Rolling Across the Wave Path */
        .rolling-gold-sphere {
            position: absolute; width: 35px; height: 35px;
            background: radial-gradient(circle at 30% 30%, #ffffff, var(--gold-glow) 40%, #b8860b 80%);
            border-radius: 50%; box-shadow: 0 0 30px var(--gold-glow), inset -5px -5px 10px rgba(0,0,0,0.6);
            offset-path: path('M -50 200 Q 300 50, 700 350 T 1500 150');
            animation: rollingSpherePath 7s linear infinite;
        }

        /* 3D Morphing Geometric Mega Abstract Shapes Encountered on Scroll */
        .massive-morphing-shape {
            position: absolute; width: 220px; height: 220px; transform-style: preserve-3d;
            opacity: 0.65; transition: transform 0.5s ease-out;
        }
        .shape-node-left { top: 20%; left: 8%; animation: hyperMorphEngine 12s linear infinite; }
        .shape-node-right { top: 65%; right: 5%; animation: hyperMorphEngine 15s linear reverse infinite; }
        .shape-node-mid { top: 120%; left: 12%; animation: hyperMorphEngine 10s linear infinite; }
        .shape-node-deep { top: 160%; right: 10%; animation: hyperMorphEngine 14s linear infinite; }

        .geometry-face {
            position: absolute; width: 100%; height: 100%;
            background: rgba(10, 5, 24, 0.75);
            border: 3px solid var(--neon-magenta);
            border-radius: 24px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: inset 0 0 30px rgba(255, 0, 127, 0.3), 0 0 20px rgba(121, 40, 202, 0.4);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--extreme-cursive); font-size: 3.5rem; color: #fff;
            text-shadow: 0 0 15px var(--neon-magenta);
            animation: borderPulseColor 3s linear infinite alternate;
        }

        /* Keyframe Calculations for Morphing Paths */
        @keyframes infiniteTrackWave {
            0% { transform: rotate(-4deg) translateY(-20px); }
            100% { transform: rotate(-2deg) translateY(20px); }
        }
        @keyframes rollingSpherePath {
            0% { offset-distance: 0%; }
            100% { offset-distance: 100%; }
        }
        @keyframes hyperMorphEngine {
            0% { transform: rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1); border-radius: 24px; }
            33% { transform: rotateX(120deg) rotateY(180deg) scale3d(1.2, 0.8, 1.2); border-radius: 50%; }
            66% { transform: rotateX(240deg) rotateY(90deg) scale3d(0.8, 1.3, 0.9); border-radius: 10px; }
            100% { transform: rotateX(360deg) rotateY(360deg) scale3d(1, 1, 1); border-radius: 24px; }
        }
        @keyframes borderPulseColor {
            0% { border-color: var(--neon-magenta); box-shadow: inset 0 0 30px rgba(255, 0, 127, 0.3); }
            50% { border-color: var(--gold-glow); box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.3); }
            100% { border-color: #0070f3; box-shadow: inset 0 0 30px rgba(0, 112, 243, 0.3); }
        }

        /* --- IMMOVABLE FLOATING HEADER (ALL CURSIVE) --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 95px;
            background: rgba(10, 5, 24, 0.93); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255, 0, 127, 0.3);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 35px; z-index: 5000;
        }
        
        .brand-cursive-trigger { display: flex; flex-direction: column; text-decoration: none; cursor: pointer; }
        .main-cursive-logo { font-family: var(--primary-cursive); font-size: 2.8rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 15px var(--neon-magenta); }
        .sub-cursive-author { font-family: var(--extreme-cursive); font-size: 2rem; color: var(--gold-glow); text-shadow: 0 0 10px var(--gold-glow); margin-top: -12px; }

        .header-rk-badge-sphere {
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--fluid-gradient);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--primary-cursive); font-weight: 900; font-size: 2.2rem; color: #ffffff;
            border: 2px solid #ffffff; box-shadow: 0 0 20px var(--neon-magenta);
            cursor: pointer; transition: 0.4s ease;
        }
        .header-rk-badge-sphere:hover { transform: scale(1.1) rotate(15deg); box-shadow: 0 0 30px var(--gold-glow); }

        /* --- NAVIGATION SLIDER CARDS --- */
        .curved-navigation-drawer {
            position: fixed; top: 0; right: -350px; width: 330px; height: 100vh;
            background: rgba(6, 3, 15, 0.98); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-left: 2px solid var(--gold-glow); box-shadow: -10px 0 40px rgba(0,0,0,0.9);
            z-index: 9000; padding: 110px 25px 30px 25px; display: flex; flex-direction: column; gap: 25px;
            transition: right 0.5s cubic-bezier(0.1, 0.9, 0.2, 1); overflow-y: auto;
        }
        .curved-navigation-drawer.panel-active { right: 0; }
        
        .drawer-cursive-title { font-family: var(--primary-cursive); font-size: 2.4rem; color: var(--neon-magenta); text-align: center; margin: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .cursive-links-bucket { display: flex; flex-direction: column; gap: 15px; }
        .link-row-item {
            display: flex; align-items: center; gap: 15px; padding: 12px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px;
            cursor: pointer; transition: 0.3s;
        }
        .link-row-item:hover { background: rgba(255, 215, 0, 0.08); border-color: var(--gold-glow); transform: translateX(-5px); }
        .row-item-cursive-title { font-family: var(--accent-cursive); font-size: 1.9rem; color: #ffffff; text-shadow: 0 0 5px var(--gold-glow); }

        /* --- SYSTEM TERMINAL HOUSING --- */
        .workspace-master-housing { width: 100%; max-width: 700px; margin: 30px auto 0 auto; position: relative; z-index: 10; text-align: center; }
        
        .hero-cursive-headline { font-family: var(--primary-cursive); font-size: 4.5rem; margin: 0 0 25px 0; background: linear-gradient(to right, #fff, var(--gold-glow), var(--neon-magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }

        .premium-cursive-card {
            width: 100%; background: rgba(10, 5, 24, 0.88);
            border: 2px solid rgba(255, 0, 127, 0.25); border-radius: 35px; padding: 45px 30px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: relative; overflow: hidden;
        }
        .premium-cursive-card::before { content: ""; position: absolute; top:0; left:0; width:100%; height:4px; background: linear-gradient(90deg, var(--gold-glow), var(--neon-magenta)); }

        .input-node-container { text-align: left; margin-bottom: 28px; }
        .input-node-container label { font-family: var(--accent-cursive); font-size: 2.1rem; color: var(--gold-glow); display: block; margin-bottom: 4px; text-shadow: 0 0 8px rgba(255,215,0,0.3); }
        
        input[type="text"], select {
            width: 100%; padding: 15px 20px; background: rgba(5, 2, 12, 0.95);
            border: 1.5px solid rgba(255, 255, 255, 0.1); color: #ffffff; border-radius: 16px;
            font-family: var(--royal-cursive); font-size: 1.5rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus, select:focus { border-color: var(--gold-glow); box-shadow: 0 0 15px rgba(255, 215, 0, 0.25); }

        .btn-cursive-submit {
            width: 100%; padding: 15px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, var(--gold-glow), var(--neon-magenta));
            color: #ffffff; font-family: var(--primary-cursive); font-size: 2.4rem; font-weight: bold;
            cursor: pointer; margin-top: 20px; box-shadow: 0 10px 30px rgba(255, 0, 127, 0.3); transition: 0.3s;
        }
        .btn-cursive-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 35px var(--neon-magenta); }

        /* REAL-TIME DIAGNOSTIC SYSTEM LOG LABELS (ALL SCREEN CONSOLE BASED) */
        .console-stream-logs { margin-top: 25px; font-family: var(--accent-cursive); font-size: 2rem; color: var(--neon-magenta); min-height: 35px; text-shadow: 0 0 5px rgba(255,0,127,0.2); }
        .success-stream-logs { color: #00ffcc !important; text-shadow: 0 0 10px rgba(0,255,204,0.4) !important; }

        .output-viewport-box { margin-top: 30px; width: 100%; display: none; border-radius: 24px; overflow: hidden; border: 2px solid var(--gold-glow); }
        .output-viewport-box img { width: 100%; display: block; }
        
        .output-text-viewport { margin-top: 30px; width: 100%; display: none; padding: 25px; background: rgba(5,2,12,0.9); border-radius: 16px; border: 2px dashed var(--neon-magenta); text-align: left; font-family: var(--royal-cursive); font-size: 1.5rem; }
        
        .btn-download-trigger { display: none; width: 100%; padding: 14px; margin-top: 20px; border: none; background: #00ffcc; color: #000; font-family: var(--primary-cursive); font-size: 2rem; font-weight: bold; border-radius: 16px; cursor: pointer; }

        .devotional-footer-stamp { font-family: var(--primary-cursive); font-size: 3.8rem; margin-top: 140px; background: linear-gradient(90deg, #ff9933, #ffffff, #ff9933); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 4px; text-shadow: 0 0 15px rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="cinematic-3d-pipeline-container">
        <div class="morphing-wavy-track"></div>
        <div class="rolling-gold-sphere"></div>
        
        <div class="massive-morphing-shape shape-node-left"><div class="geometry-face">Vidtor</div></div>
        <div class="massive-morphing-shape shape-node-right"><div class="geometry-face">AI</div></div>
        <div class="massive-morphing-shape shape-node-mid"><div class="geometry-face">Rajkumar</div></div>
        <div class="massive-morphing-shape shape-node-deep"><div class="geometry-face">Matrix</div></div>
    </div>

    <header>
        <div class="brand-cursive-trigger" onclick="window.location.reload()">
            <span class="main-cursive-logo">Vidtor AI</span>
            <span class="sub-cursive-author">by Rajkumar</span>
        </div>
        <div class="header-rk-badge-sphere" onclick="toggleNavDrawerEngine()">RK</div>
    </header>

    <div class="curved-navigation-drawer" id="globalNavDrawer">
        <button style="position:absolute; top:20px; right:25px; background:none; border:none; color:var(--neon-magenta); font-size:2.5rem; cursor:pointer;" onclick="toggleNavDrawerEngine()">×</button>
        <h4 class="drawer-cursive-title">Neural Networks</h4>
        
        <div class="cursive-links-bucket">
            <div class="link-row-item" onclick="activateModelCluster('black-forest-labs/FLUX.1-dev', 'image')">
                <span style="font-size:1.5rem;">🖼️</span>
                <span class="row-item-cursive-title">Flux.1 Ultra Real</span>
            </div>
            <div class="link-row-item" onclick="activateModelCluster('stabilityai/stable-diffusion-xl-base-1.0', 'image')">
                <span style="font-size:1.5rem;">🎨</span>
                <span class="row-item-cursive-title">Stable Diffusion XL</span>
            </div>
            <div class="link-row-item" onclick="activateModelCluster('Qwen/Qwen2.5-72B-Instruct', 'text')">
                <span style="font-size:1.5rem;">🤖</span>
                <span class="row-item-cursive-title">Qwen 2.5 Expert AI</span>
            </div>
            <div class="link-row-item" onclick="activateModelCluster('meta-llama/Llama-3.1-8B-Instruct', 'text')">
                <span style="font-size:1.5rem;">💬</span>
                <span class="row-item-cursive-title">Llama 3.1 Suite Engine</span>
            </div>
        </div>
    </div>

    <div class="workspace-master-housing">
        <h1 class="hero-cursive-headline">Neural Engine Matrix</h1>

        <div class="premium-cursive-card" id="mainTerminalConsole">
            
            <div class="input-node-container">
                <label>Server Access Authentication Token</label>
                <input type="text" id="appSecureToken" placeholder="Paste your confidential Hugging Face hf_... token key here">
            </div>

            <div class="input-node-container">
                <label>Selected World Neural Network Path</label>
                <input type="text" id="appModelPathSelector" value="black-forest-labs/FLUX.1-dev" placeholder="Neural directory path">
            </div>

            <div class="input-node-container">
                <label>Model Processing Matrix Output Type</label>
                <select id="appProcessingFormat">
                    <option value="image">Generates Graphic Frame Layer</option>
                    <option value="text">Generates Complete Natural Text Scripts</option>
                </select>
            </div>

            <div class="input-node-container">
                <label>Command Input String / Prompt Details</label>
                <input type="text" id="appPromptString" placeholder="Describe the structural layout assets required explicitly...">
            </div>

            <button class="btn-cursive-submit" onclick="executeNeuralClusterPipeline()">Fire Selected AI Engine Nodes</button>

            <div class="console-stream-logs" id="appConsoleSystemLogs">Dashboard Initialized. Enter variables to begin pipeline stream.</div>

            <div class="output-viewport-box" id="appGraphicOutputWrapper">
                <img src="" id="targetOutputImageFrame" alt="Rendered Matrix Layer Output">
            </div>
            
            <div class="output-text-viewport" id="appTextOutputWrapper"></div>
            
            <button class="btn-download-trigger" id="appGlobalDownloadBtn" onclick="downloadActiveAsset()">Download Output File</button>

        </div>

        <div class="devotional-footer-stamp">Radhe Radhe</div>
    </div>

    <script>
        function toggleNavDrawerEngine() {
            document.getElementById('globalNavDrawer').classList.toggle('panel-active');
        }

        function activateModelCluster(path, type) {
            document.getElementById('appModelPathSelector').value = path;
            document.getElementById('appProcessingFormat').value = type;
            toggleNavDrawerEngine();

            document.getElementById('mainTerminalConsole').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => { document.getElementById('appPromptString').focus(); }, 800);
        }

        async function executeNeuralClusterPipeline() {
            const token = document.getElementById('appSecureToken').value.trim();
            const modelPath = document.getElementById('appModelPathSelector').value.trim();
            const processType = document.getElementById('appProcessingFormat').value;
            const prompt = document.getElementById('appPromptString').value.trim();
            const logs = document.getElementById('appConsoleSystemLogs');
            
            const graphicWrapper = document.getElementById('appGraphicOutputWrapper');
            const imgElement = document.getElementById('targetOutputImageFrame');
            const textWrapper = document.getElementById('appTextOutputWrapper');
            const downloadBtn = document.getElementById('appGlobalDownloadBtn');

            // --- ALL DELETED SYSTEM ALERT DIALOGS OVERRIDDEN TO CONSOLE INTERFACES ---
            if(!token) { 
                logs.classList.remove('success-stream-logs');
                logs.innerText = "Rajkumar bhai, pehle Token key fill karo!"; 
                return; 
            }
            if(!modelPath) { 
                logs.classList.remove('success-stream-logs');
                logs.innerText = "Pipeline Error: AI Model path config is required!"; 
                return; 
            }
            if(!prompt) { 
                logs.classList.remove('success-stream-logs');
                logs.innerText = "String Warning: Processing command query token cannot be empty!"; 
                return; 
            }

            logs.classList.remove('success-stream-logs');
            logs.innerText = "Initializing high-speed secure cluster stream...";
            graphicWrapper.style.style = "none"; graphicWrapper.style.display = "none";
            textWrapper.style.display = "none"; downloadBtn.style.display = "none";

            try {
                const response = await fetch(
                    `https://api-inference.huggingface.co/models/${modelPath}`,
                    {
                        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                if (!response.ok) throw new Error(`Server Status: ${response.status}`);
                logs.innerText = "Compiling and injecting response asset files...";

                if(processType === 'image') {
                    const receivedBlob = await response.blob();
                    imgElement.src = URL.createObjectURL(receivedBlob);
                    graphicWrapper.style.display = "block";
                    downloadBtn.style.display = "block";
                } else if (processType === 'text') {
                    const responseJson = await response.json();
                    textWrapper.innerText = Array.isArray(responseJson) ? responseJson[0].generated_text : JSON.stringify(responseJson);
                    textWrapper.style.display = "block";
                }
                logs.classList.add('success-stream-logs');
                logs.innerText = "Success: Process completely finished!";
            } catch (error) {
                logs.innerText = "Terminal Exception: Selected cluster target node timed out.";
            }
        }

        function downloadActiveAsset() {
            const frame = document.getElementById('targetOutputImageFrame');
            if(frame.src) {
                const triggerAnchor = document.createElement('a');
                triggerAnchor.href = frame.src;
                triggerAnchor.download = `VIDTOR_3D_MORPH_${Date.now()}.png`;
                document.body.appendChild(triggerAnchor); triggerAnchor.click(); document.body.removeChild(triggerAnchor);
            }
        }
    </script>
</body>
</html>
