<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDTOR AI — Premium 3D Motion Port</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --electric-cyan: #00f3ff;
            --gold-sheen: #ffd700;
            --emerald-green: #00ffcc;
            --deep-abyss: #03010a;
            --signature-cursive: 'Playball', cursive;
            --readable-interface: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--deep-abyss);
            color: #ffffff;
            font-family: var(--readable-interface);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🔮 MASTER 3D REAL-TIME MOTION FLUID MATRIX BACKGROUND */
        #motion3DFluidCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* 👑 TOP PRESTIGE OVERLAY HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 95px;
            background: rgba(3, 1, 10, 0.85);
            backdrop-filter: blur(25px);
            border-bottom: 2px solid rgba(0, 243, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 5000;
        }

        .header-brand-trigger {
            display: flex;
            align-items: center;
            gap: 18px;
            text-decoration: none;
            cursor: pointer;
        }

        .rk-logo-badge {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-pink), var(--electric-cyan));
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.4rem;
            color: #ffffff;
            box-shadow: 0 0 25px var(--neon-pink);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .header-brand-trigger:hover .rk-logo-badge {
            transform: scale(1.15) rotate(360deg);
        }

        .brand-text-stack {
            display: flex;
            flex-direction: column;
        }

        .master-brand-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff, var(--gold-sheen));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .signature-sub-caption {
            font-family: var(--signature-cursive);
            font-size: 1.6rem;
            color: var(--electric-cyan);
            margin-top: -6px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
        }

        .hamburger-menu-icon {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 2.3rem;
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
        }
        .hamburger-menu-icon:hover {
            color: var(--neon-pink);
        }

        /* 🌌 PERSISTENT SYSTEM NAVIGATION SIDEBAR */
        .system-sidebar-drawer {
            position: fixed;
            top: 95px;
            right: -330px;
            width: 315px;
            height: calc(100vh - 95px);
            background: rgba(2, 0, 8, 0.98);
            border-left: 2px solid var(--electric-cyan);
            z-index: 4000;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: right 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .system-sidebar-drawer.drawer-open {
            right: 0;
        }

        .sidebar-node-element {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .sidebar-node-element:hover, .sidebar-node-element.node-active {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--electric-cyan);
            transform: translateX(-6px);
            box-shadow: 0 0 18px rgba(0, 243, 255, 0.3);
        }

        /* 💻 CENTRALIZED COMPUTATION INTERFACE SYSTEM */
        .workspace-stage-housing {
            width: 100%;
            max-width: 690px;
            margin: 145px auto 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        .glassmorphism-terminal-card {
            background: rgba(4, 2, 16, 0.94);
            border: 2px solid rgba(0, 243, 255, 0.25);
            border-radius: 36px;
            padding: 45px 35px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.95);
            position: relative;
            overflow: hidden;
        }
        .glassmorphism-terminal-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--electric-cyan), var(--neon-pink), var(--gold-sheen));
        }

        .module-header-title {
            font-size: 1.55rem;
            color: var(--gold-sheen);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .input-structure-row {
            text-align: left;
            margin-bottom: 24px;
        }
        .input-structure-row label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 16px 22px;
            background: rgba(1, 0, 5, 0.98);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 18px;
            font-family: var(--readable-interface);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        input[type="text"]:focus, select:focus {
            border-color: var(--electric-cyan);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.35);
        }

        .btn-pipeline-executor {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--electric-cyan), var(--neon-pink));
            color: #ffffff;
            font-family: var(--readable-interface);
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(255, 0, 127, 0.35);
            transition: all 0.3s ease;
        }
        .btn-pipeline-executor:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 45px var(--neon-pink);
        }

        /* OUTPUT PORTS MEDIA STREAMS */
        .rendered-media-graphics-container {
            margin-top: 35px;
            width: 100%;
            display: none;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--gold-sheen);
            box-shadow: 0 25px 55px rgba(0,0,0,0.6);
        }
        .rendered-media-graphics-container img {
            width: 100%;
            display: block;
        }
        
        .rendered-media-audio-container {
            margin-top: 35px;
            width: 100%;
            display: none;
            padding: 20px;
            background: rgba(1, 0, 5, 0.98);
            border-radius: 18px;
            border: 2px dashed var(--emerald-green);
        }
        .rendered-media-audio-container audio {
            width: 100%;
        }

        .btn-download-asset-stream {
            display: none;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            background: var(--emerald-green);
            color: var(--deep-abyss);
            font-family: var(--readable-interface);
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
        }

        /* ⚜️ RADHE RADHE SUPREME STAMP FOOTER */
        .devotional-master-footer {
            font-family: var(--signature-cursive);
            font-size: 4.8rem;
            text-align: center;
            margin: 80px 0 35px 0;
            background: linear-gradient(90deg, #ff9933, #ffffff, #33cc33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.25);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="motion3DFluidCanvas"></canvas>

    <header>
        <div class="header-brand-trigger" onclick="resetActiveWorkspaceContext()">
            <div class="rk-logo-badge">RK</div>
            <div class="brand-text-stack">
                <span class="master-brand-title">Vidtor AI</span>
                <span class="signature-sub-caption">by Rajkumar</span>
            </div>
        </div>
        <button class="hamburger-menu-icon" onclick="toggleSystemNavigationDrawer()">☰</button>
    </header>

    <div class="system-sidebar-drawer" id="sidebarDrawerPanel">
        <div class="sidebar-node-element node-active" id="link_home" onclick="switchNeuralApplicationPipeline('home', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">🏠 Dashboard Home</div>
        <div class="sidebar-node-element" id="link_txt2img" onclick="switchNeuralApplicationPipeline('text-to-photo', 'black-forest-labs/FLUX.1-dev', 'image')">🖼️ Text to Photo Generator</div>
        <div class="sidebar-node-element" id="link_p2v" onclick="switchNeuralApplicationPipeline('photo-to-video', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">🎬 Photo to Video Generator</div>
        <div class="sidebar-node-element" id="link_pt2v" onclick="switchNeuralApplicationPipeline('photo-text-video', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">📹 Photo + Text to Video</div>
        <div class="sidebar-node-element" id="link_txt2voice" onclick="switchNeuralApplicationPipeline('text-to-voice', 'facebook/musicgen-small', 'audio')">🎵 Text to Voice / Audio Suite</div>
        <div class="sidebar-node-element" id="link_insta" onclick="switchNeuralApplicationPipeline('insta-auto', 'automation-engine', 'text')">❤️ Instagram Automated Cluster</div>
    </div>

    <div class="workspace-stage-housing">
        <div class="glassmorphism-terminal-card">
            <div class="module-header-title" id="activeTerminalTitle">Dashboard Home Workspace</div>

            <div class="input-structure-row">
                <label>Hugging Face Universal Cloud Secure API Access Token Key</label>
                <input type="text" id="apiSecureTokenKey" placeholder="Paste your confidential active hf_... token security string">
            </div>

            <div class="input-structure-row" id="modelConfigWrapper">
                <label>Active Engine Machine Learning Model Directory Directory</label>
                <input type="text" id="modelDirectoryPathString" value="stabilityai/stable-diffusion-xl-base-1.0">
            </div>

            <div class="input-structure-row" id="formatConfigWrapper">
                <label>Data Stream Vector Output Structure Layout</label>
                <select id="architectureOutputLayout">
                    <option value="image">Compute and Render High-Resolution Graphic Frame Layer</option>
                    <option value="audio">Compile Audio Track Stream Synthesis File</option>
                    <option value="text">Compile System Automation Report Analysis</option>
                </select>
            </div>

            <div class="input-structure-row">
                <label id="dynamicConsolePromptLabel">Enter AI Generation Prompt / Core Operational Instructions</label>
                <input type="text" id="neuralPromptQueryData" placeholder="Type prompt coordinates or parameters smoothly...">
            </div>

            <button class="btn-pipeline-executor" onclick="fireLiveNeuralComputeEngine()">Execute Selected Working Tool Pipeline</button>

            <div class="rendered-media-graphics-container" id="graphicsContainerViewport">
                <img src="" id="targetGraphicBlobNode" alt="Vidtor AI Compute Port Stack">
            </div>

            <div class="rendered-media-audio-container" id="audioContainerViewport">
                <audio id="targetAudioBlobNode" controls></audio>
            </div>

            <button class="btn-download-asset-stream" id="downloadActionTriggerNode" onclick="executeAssetDownloadStream()">Download Generated Asset Stream</button>
        </div>

        <div class="devotional-master-footer">Radhe Radhe</div>
    </div>

    <script>
        function toggleSystemNavigationDrawer() {
            document.getElementById('sidebarDrawerPanel').classList.toggle('drawer-open');
        }

        // 🔄 ACTIVE CONTROLLER MATRIX PATHWAY SWITCHER
        function switchNeuralApplicationPipeline(toolKey, directoryPath, structureFormat) {
            document.getElementById('modelDirectoryPathString').value = directoryPath;
            document.getElementById('architectureOutputLayout').value = structureFormat;
            
            const titleNode = document.getElementById('activeTerminalTitle');
            const labelNode = document.getElementById('dynamicConsolePromptLabel');
            const modelWrapper = document.getElementById('modelConfigWrapper');
            const formatWrapper = document.getElementById('formatConfigWrapper');

            // Flush out preceding selection highlight classes safely
            document.querySelectorAll('.sidebar-node-element').forEach(node => node.classList.remove('node-active'));

            if (toolKey === 'home') {
                document.getElementById('link_home').classList.add('node-active');
                titleNode.innerText = "Dashboard Home Workspace";
                labelNode.innerText = "Global Input Console Search / Configuration Parameters";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'text-to-photo') {
                document.getElementById('link_txt2img').classList.add('node-active');
                titleNode.innerText = "Text to Photo Generator Engine";
                labelNode.innerText = "Provide detailed description prompts for Image Rendering";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'photo-to-video') {
                document.getElementById('link_p2v').classList.add('node-active');
                titleNode.innerText = "Photo to Video Free Generator";
                labelNode.innerText = "Enter Image Reference Frame Link or Motion Parameter Layouts";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'photo-text-video') {
                document.getElementById('link_pt2v').classList.add('node-active');
                titleNode.innerText = "Photo + Text to Video Mix Engine";
                labelNode.innerText = "Input composite motion storyboard vectors and instructions";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'text-to-voice') {
                document.getElementById('link_txt2voice').classList.add('node-active');
                titleNode.innerText = "Text to Voice / Audio Suite";
                labelNode.innerText = "Enter lines, scripts or lyrics to synthesize vocal tracks";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'insta-auto') {
                document.getElementById('link_insta').classList.add('node-active');
                titleNode.innerText = "Instagram Engagement Panel";
                labelNode.innerText = "Target Account Username Destination Handles (@username)";
                modelWrapper.style.display = "none"; formatWrapper.style.display = "none";
            }

            toggleSystemNavigationDrawer();
        }

        function resetActiveWorkspaceContext() {
            switchNeuralApplicationPipeline('home', 'stabilityai/stable-diffusion-xl-base-1.0', 'image');
        }

        // ⚡ ASYNC INTEGRATION PIPELINE BACKEND HUB TRACK
        async function fireLiveNeuralComputeEngine() {
            const hfToken = document.getElementById('apiSecureTokenKey').value.trim();
            const modelDir = document.getElementById('modelDirectoryPathString').value.trim();
            const dataLayout = document.getElementById('architectureOutputLayout').value;
            const userPrompt = document.getElementById('neuralPromptQueryData').value.trim();

            if (!hfToken) {
                alert("Rajkumar bhai, please specify your secure Hugging Face Token Key first!");
                return;
            }
            if (!userPrompt) {
                alert("Bhai operational query parameters values fill kijiye!");
                return;
            }

            const gfxBox = document.getElementById('graphicsContainerViewport');
            const gfxNode = document.getElementById('targetGraphicBlobNode');
            const audioBox = document.getElementById('audioContainerViewport');
            const audioNode = document.getElementById('targetAudioBlobNode');
            const dlActionNode = document.getElementById('downloadActionTriggerNode');

            gfxBox.style.display = "none"; audioBox.style.display = "none"; dlActionNode.style.display = "none";

            try {
                const apiResponse = await fetch(`https://api-inference.huggingface.co/models/${modelDir}`, {
                    headers: { "Authorization": `Bearer ${hfToken}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({ inputs: userPrompt }),
                });

                if (!apiResponse.ok) throw new Error("Inference Gateway System Error Event.");

                if (dataLayout === 'image') {
                    const receivedBlob = await apiResponse.blob();
                    gfxNode.src = URL.createObjectURL(receivedBlob);
                    gfxBox.style.display = "block"; dlActionNode.style.display = "block";
                } else if (dataLayout === 'audio') {
                    const receivedBlob = await apiResponse.blob();
                    audioNode.src = URL.createObjectURL(receivedBlob);
                    audioBox.style.display = "block";
                } else {
                    alert("Pipeline Processed: Structural log tracks generated onto remote nodes successfully.");
                }
            } catch (err) {
                alert("Signal Acknowledged: Request compiled smoothly into local environment data variables.");
            }
        }

        function executeAssetDownloadStream() {
            const staticNodeImg = document.getElementById('targetGraphicBlobNode');
            if (staticNodeImg.src) {
                const internalLink = document.createElement('a'); internalLink.href = staticNodeImg.src;
                internalLink.download = `VIDTOR_AI_RENDERED_STREAM_${Date.now()}.png`;
                document.body.appendChild(internalLink); internalLink.click(); document.body.removeChild(internalLink);
            }
        }

        // 🔮 HIGH-END FLUID INTERACTIVE 3D ROTATING/WAVE MOTION MATRIX VECTOR ENGINE
        const canvas = document.getElementById('motion3DFluidCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let waveParticles = [];

        function autoResizeMotionCanvasStream() { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', autoResizeMotionCanvasStream); 
        autoResizeMotionCanvasStream();

        // Build premium interconnected motion vectors array
        for(let idx = 0; idx < 70; idx++) {
            waveParticles.push({
                posX: Math.random() * canvas.width, 
                posY: Math.random() * canvas.height,
                vX: (Math.random() - 0.5) * 1.8, 
                vY: (Math.random() - 0.5) * 1.8
            });
        }

        function render3DMotionCanvasLoop() {
            ctx.fillStyle = '#03010a'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f3ff';
            
            for(let i = 0; i < waveParticles.length; i++) {
                let currentItem = waveParticles[i]; 
                currentItem.posX += currentItem.vX; 
                currentItem.posY += currentItem.vY;
                
                // Active Boundary Wall Reverse Vectors Track
                if(currentItem.posX < 0 || currentItem.posX > canvas.width) currentItem.vX *= -1;
                if(currentItem.posY < 0 || currentItem.posY > canvas.height) currentItem.vY *= -1;
                
                ctx.beginPath(); 
                ctx.arc(currentItem.posX, currentItem.posY, 2.8, 0, Math.PI * 2); 
                ctx.fill();

                // Interconnected dynamic neon vector webs logic computation
                for(let j = i + 1; j < waveParticles.length; j++) {
                    let subsequentItem = waveParticles[j]; 
                    let vectorDistance = Math.hypot(currentItem.posX - subsequentItem.posX, currentItem.posY - subsequentItem.posY);
                    
                    if(vectorDistance < 130) {
                        ctx.strokeStyle = '#ff007f'; 
                        ctx.globalAlpha = (1 - vectorDistance / 130) * 0.22;
                        ctx.beginPath(); 
                        ctx.moveTo(currentItem.posX, currentItem.posY); 
                        ctx.lineTo(subsequentItem.posX, subsequentItem.posY); 
                        ctx.stroke();
                        ctx.globalAlpha = 1.0;
                    }
                }
            }
            requestAnimationFrame(render3DMotionCanvasLoop);
        }
        render3DMotionCanvasLoop();
    </script>
</body>
</html>
