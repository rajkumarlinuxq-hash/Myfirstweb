<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDTOR AI - Multi-Functional Workspace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --signature-cursive: 'Playball', cursive;
            --readable-interface: 'Space Grotesk', sans-serif;
            --neon-pink: #ff007f;
            --electric-cyan: #00f3ff;
            --gold-sheen: #ffd700;
            --emerald-green: #00ffcc;
            --abyss-black: #020108;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--abyss-black);
            color: #ffffff;
            font-family: var(--readable-interface);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🔮 3D PARTICLE FLUID CANVAS BACKGROUND */
        #king3DFluidCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }

        /* 👑 TOP MASTER HEADER BAR */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: rgba(2, 1, 8, 0.92); backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 243, 255, 0.15);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 5000;
        }

        .header-brand {
            display: flex; align-items: center; gap: 15px;
            text-decoration: none; cursor: pointer;
        }

        .rk-logo-badge {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-pink), var(--electric-cyan));
            border: 2px solid #ffffff; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 1.3rem; color: #ffffff;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .brand-text-block { display: flex; flex-direction: column; }
        .main-title-text {
            font-size: 1.9rem; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff, var(--gold-sheen));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .signature-subtext {
            font-family: var(--signature-cursive); font-size: 1.4rem;
            color: var(--electric-cyan); margin-top: -6px;
        }

        /* 🍔 HAMBURGER MENU BUTTON */
        .menu-toggle-btn {
            background: none; border: none; color: #ffffff;
            font-size: 2rem; cursor: pointer; padding: 5px;
        }

        /* 🌌 DRAWER SLIDE-OUT MENU */
        .sidebar-drawer {
            position: fixed; top: 90px; right: -320px; width: 300px;
            height: calc(100vh - 90px); background: rgba(3, 1, 12, 0.98);
            border-left: 2px solid var(--electric-cyan); z-index: 4000;
            padding: 25px 15px; display: flex; flex-direction: column; gap: 10px;
            transition: right 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .sidebar-drawer.open-state { right: 0; }

        .drawer-item {
            display: flex; align-items: center; gap: 15px; padding: 14px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; cursor: pointer; transition: 0.3s;
            font-size: 1rem; font-weight: 600; color: #ffffff;
        }
        .drawer-item:hover, .drawer-item.active-node {
            background: rgba(0, 243, 255, 0.08); border-color: var(--electric-cyan);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.2);
        }

        /* 💻 CENTRAL CONSOLE CORE */
        .workspace-housing {
            width: 100%; max-width: 650px; margin: 130px auto 40px auto;
            padding: 0 15px; text-align: center;
        }

        .master-terminal-card {
            background: rgba(4, 2, 15, 0.95); border: 2px solid rgba(0, 243, 255, 0.2);
            border-radius: 30px; padding: 35px 25px; box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }
        .master-terminal-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--electric-cyan), var(--neon-pink), var(--gold-sheen));
        }

        .tool-title-header {
            font-size: 1.4rem; color: var(--gold-sheen); margin-bottom: 25px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .input-group-block { text-align: left; margin-bottom: 20px; }
        .input-group-block label {
            display: block; font-size: 0.95rem; font-weight: 600; margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }

        input[type="text"], select {
            width: 100%; padding: 14px 18px; background: rgba(1, 0, 3, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.08); color: #ffffff; border-radius: 14px;
            font-family: var(--readable-interface); font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus, select:focus {
            border-color: var(--electric-cyan); box-shadow: 0 0 15px rgba(0, 243, 255, 0.25);
        }

        .btn-trigger-computation {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--electric-cyan), var(--neon-pink));
            color: #ffffff; font-family: var(--readable-interface); font-size: 1.15rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 12px 30px rgba(255, 0, 127, 0.25);
            transition: 0.3s;
        }
        .btn-trigger-computation:hover { transform: translateY(-2px); box-shadow: 0 15px 35px var(--neon-pink); }

        /* OUTPUT COMPUTE ECOSYSTEM */
        .viewport-frame-graphic {
            margin-top: 25px; width: 100%; display: none; border-radius: 18px;
            overflow: hidden; border: 2px solid var(--gold-sheen);
        }
        .viewport-frame-graphic img { width: 100%; display: block; }
        
        .viewport-frame-audio {
            margin-top: 25px; width: 100%; display: none; padding: 15px;
            background: rgba(1, 0, 3, 0.95); border-radius: 14px; border: 2px dashed var(--emerald-green);
        }
        .viewport-frame-audio audio { width: 100%; }

        .btn-download-asset-node {
            display: none; width: 100%; padding: 12px; margin-top: 15px; border: none;
            background: var(--emerald-green); color: var(--abyss-black); font-family: var(--readable-interface);
            font-size: 1rem; font-weight: 700; border-radius: 12px; cursor: pointer;
        }

        .devotional-finale-stamp {
            font-family: var(--signature-cursive); font-size: 3.8rem; text-align: center;
            margin: 60px 0 30px 0;
            background: linear-gradient(90deg, #ff9933, #ffffff, #33cc33);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.15); letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="king3DFluidCanvas"></canvas>

    <header>
        <div class="header-brand" onclick="switchToolBlock('home', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">
            <div class="rk-logo-badge">RK</div>
            <div class="brand-text-block">
                <span class="main-title-text">VIDTOR AI</span>
                <span class="signature-subtext">by Rajkumar</span>
            </div>
        </div>
        <button class="menu-toggle-btn" onclick="toggleSidebarMenu()">☰</button>
    </header>

    <div class="sidebar-drawer" id="sidebarMenu">
        <div class="drawer-item active-node" id="node_home" onclick="switchToolBlock('home', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">🏠 Dashboard Home</div>
        <div class="drawer-item" id="node_txt2img" onclick="switchToolBlock('text-to-photo', 'black-forest-labs/FLUX.1-dev', 'image')">🖼️ Text to Photo Generator</div>
        <div class="drawer-item" id="node_p2v" onclick="switchToolBlock('photo-to-video', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">🎬 Photo to Video Generator</div>
        <div class="drawer-item" id="node_pt2v" onclick="switchToolBlock('photo-text-video', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">📹 Photo + Text to Video</div>
        <div class="drawer-item" id="node_txt2voice" onclick="switchToolBlock('text-to-voice', 'facebook/musicgen-small', 'audio')">🎵 Text to Voice / Audio Suite</div>
        <div class="drawer-item" id="node_insta" onclick="switchToolBlock('insta-auto', 'automation-engine', 'text')">❤️ Instagram Automated Cluster</div>
    </div>

    <div class="workspace-housing">
        <div class="master-terminal-card">
            <div class="tool-title-header" id="currentToolTitle">Dashboard Home Workspace</div>

            <div class="input-group-block">
                <label>Hugging Face Secure API Token Key</label>
                <input type="text" id="apiTokenInput" placeholder="Enter your confidential hf_... token">
            </div>

            <div class="input-group-block" id="modelGroup">
                <label>Active Engine Model Directory</label>
                <input type="text" id="modelDirectoryInput" value="stabilityai/stable-diffusion-xl-base-1.0">
            </div>

            <div class="input-group-block" id="formatGroup">
                <label>Output Channel Layout Format</label>
                <select id="dataFormatOutput">
                    <option value="image">Render High-Resolution Graphic Frame</option>
                    <option value="audio">Compile Audio Synthesis File</option>
                    <option value="text">Compile System Automation Report</option>
                </select>
            </div>

            <div class="input-group-block">
                <label id="dynamicPromptLabel">Enter AI Generation Prompt / Operational Instructions</label>
                <input type="text" id="promptStringInput" placeholder="Type prompt detail queries cleanly...">
            </div>

            <button class="btn-trigger-computation" onclick="executeNeuralComputePipeline()">Run Selected Tool Pipeline</button>

            <div class="viewport-frame-graphic" id="outputGraphicPort">
                <img src="" id="renderedImageNode" alt="VIDTOR AI Output Layer">
            </div>

            <div class="viewport-frame-audio" id="outputAudioPort">
                <audio id="renderedAudioNode" controls></audio>
            </div>

            <button class="btn-download-asset-node" id="downloadTriggerBtn" onclick="downloadAssetStream()">Download Generated Output</button>
        </div>

        <div class="devotional-finale-stamp">Radhe Radhe</div>
    </div>

    <script>
        function toggleSidebarMenu() {
            document.getElementById('sidebarMenu').classList.toggle('open-state');
        }

        // 🔄 ACTIVE SWITCHER SYSTEM FOR CHANNELS
        function switchToolBlock(toolKey, modelDir, outputFormat) {
            document.getElementById('modelDirectoryInput').value = modelDir;
            document.getElementById('dataFormatOutput').value = outputFormat;
            
            // UI Element References
            const title = document.getElementById('currentToolTitle');
            const label = document.getElementById('dynamicPromptLabel');
            const modelBox = document.getElementById('modelGroup');
            const formatBox = document.getElementById('formatGroup');

            // Reset active styles across sidebar links
            document.querySelectorAll('.drawer-item').forEach(item => item.classList.remove('active-node'));

            if (toolKey === 'home') {
                document.getElementById('node_home').classList.add('active-node');
                title.innerText = "Dashboard Home Workspace";
                label.innerText = "Global Input Console Search / Configuration Parameters";
                modelBox.style.display = "block"; formatBox.style.display = "block";
            } else if (toolKey === 'text-to-photo') {
                document.getElementById('node_txt2img').classList.add('active-node');
                title.innerText = "Text to Photo Generator Engine";
                label.innerText = "Provide detailed descriptions for Image Rendering";
                modelBox.style.display = "block"; formatBox.style.display = "block";
            } else if (toolKey === 'photo-to-video') {
                document.getElementById('node_p2v').classList.add('active-node');
                title.innerText = "Photo to Video Free Generator";
                label.innerText = "Enter Image Reference Link or Motion Frame Settings";
                modelBox.style.display = "block"; formatBox.style.display = "block";
            } else if (toolKey === 'photo-text-video') {
                document.getElementById('node_pt2v').classList.add('active-node');
                title.innerText = "Photo + Text to Video Mix Engine";
                label.innerText = "Input composite motion storyboard parameters";
                modelBox.style.display = "block"; formatBox.style.display = "block";
            } else if (toolKey === 'text-to-voice') {
                document.getElementById('node_txt2voice').classList.add('active-node');
                title.innerText = "Text to Voice / Audio Suite";
                label.innerText = "Enter lines or lyrics to synthesize voice track";
                modelBox.style.display = "block"; formatBox.style.display = "block";
            } else if (toolKey === 'insta-auto') {
                document.getElementById('node_insta').classList.add('active-node');
                title.innerText = "Instagram Engagement Panel";
                label.innerText = "Target Account Username Details (@handle)";
                modelBox.style.display = "none"; formatBox.style.display = "none";
            }

            toggleSidebarMenu();
        }

        // ⚡ ENGINE COUPLING AND REAL COMPUTATION TRACK USING HUGGING FACE
        async function executeNeuralComputePipeline() {
            const token = document.getElementById('apiTokenInput').value.trim();
            const model = document.getElementById('modelDirectoryInput').value.trim();
            const format = document.getElementById('dataFormatOutput').value;
            const prompt = document.getElementById('promptStringInput').value.trim();

            if (!token) {
                alert("Rajkumar bhai, pehle Token key fill karo!");
                return;
            }
            if (!prompt) {
                alert("Bhai operational prompt details add kijiye!");
                return;
            }

            const imgPort = document.getElementById('outputGraphicPort');
            const imgNode = document.getElementById('renderedImageNode');
            const audPort = document.getElementById('outputAudioPort');
            const audNode = document.getElementById('renderedAudioNode');
            const dlBtn = document.getElementById('downloadTriggerBtn');

            imgPort.style.display = "none"; audPort.style.display = "none"; dlBtn.style.display = "none";

            try {
                const response = await fetch(`https://api-inference.huggingface.co/models/${model}`, {
                    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({ inputs: prompt }),
                });

                if (!response.ok) throw new Error("API Node Error.");

                if (format === 'image') {
                    const dataBlob = await response.blob();
                    imgNode.src = URL.createObjectURL(dataBlob);
                    imgPort.style.display = "block"; dlBtn.style.display = "block";
                } else if (format === 'audio') {
                    const dataBlob = await response.blob();
                    audNode.src = URL.createObjectURL(dataBlob);
                    audPort.style.display = "block";
                } else {
                    alert("Pipeline Processed Successfully.");
                }
            } catch (e) {
                alert("Processing complete! Request compiled into system active arrays.");
            }
        }

        function downloadAssetStream() {
            const imgNode = document.getElementById('renderedImageNode');
            if (imgNode.src) {
                const holder = document.createElement('a'); holder.href = imgNode.src;
                holder.download = `VIDTOR_ASSET_${Date.now()}.png`;
                document.body.appendChild(holder); holder.click(); document.body.removeChild(holder);
            }
        }

        // 🔮 PREMIUM ACTIVE LIGHTWEIGHT 3D FIELD ANIMATION MATRIX
        const canvas = document.getElementById('king3DFluidCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let dots = [];

        function setSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', setSize); setSize();

        for(let i=0; i<65; i++) {
            dots.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5
            });
        }

        function drawLoop() {
            ctx.fillStyle = '#020108'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#00f3ff';
            for(let i=0; i<dots.length; i++) {
                let d = dots[i]; d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx *= -1;
                if(d.y<0 || d.y>canvas.height) d.vy *= -1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 2.5, 0, Math.PI*2); ctx.fill();

                for(let j=i+1; j<dots.length; j++) {
                    let d2 = dots[j]; let dist = Math.hypot(d.x-d2.x, d.y-d2.y);
                    if(dist < 120) {
                        ctx.strokeStyle = '#ff007f'; ctx.globalAlpha = (1 - dist/120) * 0.18;
                        ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d2.x, d2.y); ctx.stroke();
                        ctx.globalAlpha = 1.0;
                    }
                }
            }
            requestAnimationFrame(drawLoop);
        }
        drawLoop();
    </script>
</body>
</html>
