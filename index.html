<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>VIDTOR AI HUB - Real FLUX AI Suite | By Rajkumar</title>
    <meta name="description" content="Access real AI models built by Rajkumar. Powered by FLUX.1-dev for hyper-realistic image generation.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Orbitron:wght@800;900&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff007f;
            --neon-purple: #9d4edd;
            --dark-space: #020208;
            --glass: rgba(12, 12, 28, 0.8);
            --border: rgba(0, 240, 255, 0.2);
        }

        body {
            margin: 0; padding: 110px 20px 40px 20px; box-sizing: border-box;
            background-color: var(--dark-space); color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* 🌈 DYNAMIC COLORFUL LIQUID NEON BACKGROUND */
        body::before {
            content: ""; position: absolute; top: -30%; left: -30%; width: 160%; height: 160%;
            background: radial-gradient(circle at 20% 20%, rgba(0, 240, 255, 0.18) 0%, transparent 45%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 127, 0.18) 0%, transparent 45%),
                        radial-gradient(circle at 50% 50%, rgba(157, 78, 221, 0.12) 0%, transparent 50%);
            z-index: -2; animation: fluidLaserGlow 15s ease-in-out infinite alternate;
        }
        @keyframes fluidLaserGlow {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, -5%) rotate(8deg); }
        }

        /* --- GLOBAL NAV SIGNATURE HEADER --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 85px;
            background: rgba(2, 2, 8, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 2px solid var(--border);
            display: flex; align-items: center; justify-content: flex-start;
            padding: 0 30px; box-sizing: border-box; z-index: 1000;
            box-shadow: 0 5px 30px rgba(0, 240, 255, 0.15);
        }
        .rk-brand-block { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .rk-spinning-logo {
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 16px;
            border: 2px solid #fff; box-shadow: 0 0 20px var(--neon-cyan);
            animation: coreSpin 7s linear infinite;
        }
        @keyframes coreSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .anti-spin { animation: stabilize 7s linear infinite; }
        @keyframes stabilize { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        
        .meta-text-stack { display: flex; flex-direction: column; }
        .title-logo-text { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(to right, #fff, var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .author-tag { font-size: 0.78rem; font-weight: 800; color: #ffbc00; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

        .workspace-container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 20px; }
        .hub-title { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; text-align: center; margin: 0; background: linear-gradient(to right, var(--neon-cyan), #fff, var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- CONTROL CONSOLE FOR REAL TEXT TO PHOTO --- */
        .real-engine-panel {
            width: 100%; max-width: 550px; background: var(--glass);
            border: 2px solid var(--border); border-radius: 24px; padding: 30px;
            box-sizing: border-box; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .real-engine-panel h3 { font-family: 'Orbitron', sans-serif; margin-top: 0; color: var(--neon-cyan); letter-spacing: 1px; }

        .control-block { text-align: left; margin-top: 20px; width: 100%; }
        label { font-size: 0.8rem; font-weight: 700; color: var(--neon-pink); display: block; margin-bottom: 8px; text-transform: uppercase; }
        
        input[type="text"] {
            width: 100%; padding: 15px; background: rgba(2,2,8,0.9);
            border: 2px solid var(--border); color: #fff; border-radius: 12px;
            font-family: inherit; font-size: 0.95rem; outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,127,0.2); }

        .btn-execute {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 800;
            cursor: pointer; margin-top: 25px; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s;
        }
        .btn-execute:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--neon-pink); }

        .engine-logs { margin-top: 15px; font-size: 0.9rem; color: var(--neon-pink); font-weight: bold; min-height: 25px; }
        .success-logs { color: #00ffcc !important; text-shadow: 0 0 8px rgba(0,255,204,0.4); }

        .output-display-frame {
            margin-top: 25px; width: 100%; display: none; border-radius: 16px;
            overflow: hidden; border: 2px solid var(--neon-cyan); box-shadow: 0 0 25px rgba(0,240,255,0.2);
        }
        .output-display-frame img { width: 100%; display: block; }

        .btn-download-img {
            display: none; width: 100%; padding: 12px; margin-top: 15px; border: none;
            background: #00ffcc; color: #020208; font-family: 'Orbitron', sans-serif;
            font-weight: 800; border-radius: 10px; cursor: pointer; text-transform: uppercase;
        }

        .devotional-signature { font-family: 'Cinzel', serif; font-size: 1.5rem; margin-top: 45px; background: linear-gradient(to right, #ff9933, #ffffff, #ff9933); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 5px; font-weight: 900; }
    </style>
</head>
<body>

    <header>
        <div class="rk-brand-block" onclick="window.location.reload()">
            <div class="rk-spinning-logo"><div class="anti-spin">RK</div></div>
            <div class="meta-text-stack">
                <span class="title-logo-text">VIDTOR AI</span>
                <span class="author-tag">by Rajkumar</span>
            </div>
        </div>
    </header>

    <div class="workspace-container">
        <h1 class="hub-title">Real AI Generation Engine</h1>

        <div class="real-engine-panel">
            <h3>⚡ Powered By FLUX.1-Dev</h3>
            <p style="font-size:0.85rem; opacity:0.7;">Type anything you want to create. Real server pipelines will process your prompt vectors dynamically.</p>
            
            <div class="control-block">
                <label>1. Paste Your Hugging Face Token:</label>
                <input type="text" id="hfTokenKey" placeholder="Paste your hf_... token here" value="">
            </div>

            <div class="control-block">
                <label>2. Your Creative Prompt Command:</label>
                <input type="text" id="userTextPrompt" placeholder="e.g., A futuristic city skyline at sunset, cinematic lighting...">
            </div>

            <button class="btn-execute" onclick="triggerRealFluxGeneration()">Generate Real Asset</button>
            
            <div class="engine-logs" id="fluxEngineConsole"></div>

            <div class="output-display-frame" id="outputImageWrapper">
                <img src="" id="finalFluxOutputImage" alt="AI Generated Asset">
            </div>
            <button class="btn-download-img" id="btnDownloadAsset" onclick="downloadGeneratedAsset()">⬇️ Download Image</button>
        </div>
    </div>

    <div class="devotional-signature">RADHE RADHE</div>

    <script>
        async function triggerRealFluxGeneration() {
            const hfToken = document.getElementById('hfTokenKey').value.trim();
            const prompt = document.getElementById('userTextPrompt').value.trim();
            const consoleLogs = document.getElementById('fluxEngineConsole');
            const imgWrapper = document.getElementById('outputImageWrapper');
            const outputImg = document.getElementById('finalFluxOutputImage');
            const downloadBtn = document.getElementById('btnDownloadAsset');

            if(!hfToken) {
                alert("Rajkumar bhai, pehle apna Hugging Face token paste karo!");
                return;
            }
            if(!prompt) {
                alert("Rajkumar bhai, apna text prompt likho!");
                return;
            }

            consoleLogs.classList.remove('success-logs');
            consoleLogs.innerText = "⚡ Requesting Black Forest Labs API Clusters...";
            imgWrapper.style.display = "none";
            downloadBtn.style.display = "none";

            try {
                // REAL API INTERFERENCE ROUTE CONNECTED WITH FLUX-1-DEV
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-dev",
                    {
                        headers: { 
                            "Authorization": `Bearer ${hfToken}`,
                            "Content-Type": "application/json"
                        },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                if (!response.ok) {
                    throw new Error(`Server returned absolute status layout: ${response.status}`);
                }

                consoleLogs.innerText = "⏳ Compiling Binary Image Buffer Blobs...";
                
                const responseBlob = await response.blob();
                const resultObjectUrl = URL.createObjectURL(responseBlob);

                outputImg.src = resultObjectUrl;
                imgWrapper.style.display = "block";
                downloadBtn.style.display = "block";
                
                consoleLogs.classList.add('success-logs');
                consoleLogs.innerText = "🎉 Success: Real FLUX Asset Rendered Perfectly!";

            } catch (error) {
                console.log(error);
                consoleLogs.innerText = "❌ Halted: Server busy or Invalid Token Code!";
                alert("Rajkumar bhai ya toh token galat hai, ya server abhi heavy load par hai. Ek baar check kar lo!");
            }
        }

        function downloadGeneratedAsset() {
            const imgElement = document.getElementById('finalFluxOutputImage');
            if(imgElement.src) {
                const link = document.createElement('a');
                link.href = imgElement.src;
                link.download = `VIDTOR_FLUX_ASSET_${Date.now()}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
