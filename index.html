<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidtor AI | Official King Port</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --electric-cyan: #00f3ff;
            --gold-sheen: #ffd700;
            --emerald-green: #00ffcc;
            --signature-cursive: 'Playball', cursive;
            --readable-interface: 'Space Grotesk', sans-serif;
            --background-deep: #020108;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--background-deep);
            color: #ffffff;
            font-family: var(--readable-interface);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        /* 🔮 RAJKUMAR KING: ORIGINAL GRAPHICS CANVAS ENGINE */
        #interactive3DGridCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }

        /* 👑 SOVEREIGN FLOATING BRAND HEADER */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 95px;
            background: rgba(2, 1, 8, 0.93); backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 243, 255, 0.18);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 35px; z-index: 5000;
        }

        .brand-core-trigger {
            display: flex; align-items: center; gap: 16px;
            text-decoration: none; cursor: pointer;
        }

        .rk-sovereign-logo-badge {
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-pink), var(--electric-cyan));
            border: 2px solid #ffffff; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 1.4rem; color: #ffffff;
            box-shadow: 0 0 20px var(--neon-pink);
            transition: transform 0.4s ease;
        }
        .brand-core-trigger:hover .rk-sovereign-logo-badge {
            transform: scale(1.1) rotate(360deg);
        }

        .text-stack-identity { display: flex; flex-direction: column; }
        .brand-master-title {
            font-size: 2.1rem; font-weight: 700; letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff, var(--gold-sheen));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .signature-sub-identity {
            font-family: var(--signature-cursive); font-size: 1.5rem;
            color: var(--electric-cyan); margin-top: -6px; text-shadow: 0 0 8px var(--electric-cyan);
        }

        .sidebar-trigger-icon {
            background: none; border: none; color: #ffffff;
            font-size: 2.2rem; cursor: pointer; padding: 5px;
            transition: color 0.3s ease;
        }
        .sidebar-trigger-icon:hover { color: var(--neon-pink); }

        /* 🌌 ORIGINAL PERSISTENT SIDEBAR DRAWER MATRIX */
        .master-sidebar-drawer {
            position: fixed; top: 95px; right: -325px; width: 310px;
            height: calc(100vh - 95px); background: rgba(3, 1, 12, 0.99);
            border-left: 2px solid var(--electric-cyan); z-index: 4000;
            padding: 30px 18px; display: flex; flex-direction: column; gap: 12px;
            transition: right 0.45s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .master-sidebar-drawer.drawer-active { right: 0; }

        .drawer-node-link {
            display: flex; align-items: center; gap: 16px; padding: 15px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1275);
            font-size: 1.05rem; font-weight: 600; color: #ffffff;
        }
        .drawer-node-link:hover, .drawer-node-link.selected-node-active {
            background: rgba(0, 243, 255, 0.09); border-color: var(--electric-cyan);
            transform: translateX(-5px); box-shadow: 0 0 15px rgba(0, 243, 255, 0.25);
        }

        /* 💻 CENTRALIZED MULTI-FUNCTIONAL MAIN HOUSING PANEL */
        .central-stage-wrapper {
            width: 100%; max-width: 680px; margin: 140px auto 40px auto;
            padding: 0 20px; text-align: center;
        }

        .workspace-master-card {
            background: rgba(4, 2, 16, 0.96); border: 2px solid rgba(0, 243, 255, 0.25);
            border-radius: 35px; padding: 40px 30px; box-shadow: 0 35px 85px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
        }
        .workspace-master-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--electric-cyan), var(--neon-pink), var(--gold-sheen));
        }

        .active-module-header {
            font-size: 1.5rem; color: var(--gold-sheen); margin-bottom: 28px;
            text-transform: uppercase; letter-spacing: 1.2px; text-shadow: 0 0 15px rgba(255,215,0,0.25);
        }

        .input-block-layer { text-align: left; margin-bottom: 22px; }
        .input-block-layer label {
            display: block; font-size: 1rem; font-weight: 600; margin-bottom: 8px;
            color: rgba(255,255,255,0.75); letter-spacing: 0.3px;
        }

        input[type="text"], select {
            width: 100%; padding: 15px 20px; background: rgba(1, 0, 4, 0.98);
            border: 2px solid rgba(255, 255, 255, 0.09); color: #ffffff; border-radius: 16px;
            font-family: var(--readable-interface); font-size: 1rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus, select:focus {
            border-color: var(--electric-cyan); box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .btn-core-executor {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, var(--electric-cyan), var(--neon-pink));
            color: #ffffff; font-family: var(--readable-interface); font-size: 1.2rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 14px 35px rgba(255, 0, 127, 0.3);
            transition: 0.3s ease;
        }
        .btn-core-executor:hover { transform: translateY(-3px); box-shadow: 0 18px 40px var(--neon-pink); }

        /* MULTI-MEDIA HIGH-FIDELITY COMPUTE COMPARTMENTS */
        .graphics-output-box {
            margin-top: 30px; width: 100%; display: none; border-radius: 22px;
            overflow: hidden; border: 2px solid var(--gold-sheen); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .graphics-output-box img { width: 100%; display: block; }
        
        .audio-output-box {
            margin-top: 30px; width: 100%; display: none; padding: 18px;
            background: rgba(1, 0, 4, 0.98); border-radius: 16px; border: 2px dashed var(--emerald-green);
        }
        .audio-output-box audio { width: 100%; }

        .btn-download-master-node {
            display: none; width: 100%; padding: 14px; margin-top: 18px; border: none;
            background: var(--emerald-green); color: var(--background-deep); font-family: var(--readable-interface);
            font-size: 1.05rem; font-weight: 700; border-radius: 14px; cursor: pointer;
        }

        .devotional-stamp-footer {
            font-family: var(--signature-cursive); font-size: 4.5rem; text-align: center;
            margin: 70px 0 35px 0;
            background: linear-gradient(90deg, #ff9933, #ffffff, #33cc33);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255,255,255,0.2); letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="interactive3DGridCanvas"></canvas>

    <header>
        <div class="brand-core-trigger" onclick="globalSystemResetTrigger()">
            <div class="rk-sovereign-logo-badge">RK</div>
            <div class="text-stack-identity">
                <span class="brand-master-title">Vidtor AI</span>
                <span class="signature-sub-identity">by Rajkumar</span>
            </div>
        </div>
        <button class="sidebar-trigger-icon" onclick="toggleSystemSidebarMenu()">☰</button>
    </header>

    <div class="master-sidebar-drawer" id="systemSidebarPanel">
        <div class="drawer-node-link selected-node-active" id="btnLink_home" onclick="shiftActiveApplicationContext('home', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">🏠 Dashboard Home</div>
        <div class="drawer-node-link" id="btnLink_txt2img" onclick="shiftActiveApplicationContext('text-to-photo', 'black-forest-labs/FLUX.1-dev', 'image')">🖼️ Text to Photo Generator</div>
        <div class="drawer-node-link" id="btnLink_p2v" onclick="shiftActiveApplicationContext('photo-to-video', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">🎬 Photo to Video Generator</div>
        <div class="drawer-node-link" id="btnLink_pt2v" onclick="shiftActiveApplicationContext('photo-text-video', 'stabilityai/stable-diffusion-xl-base-1.0', 'image')">📹 Photo + Text to Video</div>
        <div class="drawer-node-link" id="btnLink_txt2voice" onclick="shiftActiveApplicationContext('text-to-voice', 'facebook/musicgen-small', 'audio')">🎵 Text to Voice / Audio Suite</div>
        <div class="drawer-node-link" id="btnLink_insta" onclick="shiftActiveApplicationContext('insta-auto', 'automation-engine', 'text')">❤️ Instagram Automated Cluster</div>
    </div>

    <div class="central-stage-wrapper">
        <div class="workspace-master-card">
            <div class="active-module-header" id="workspaceHeaderTitle">Dashboard Home Workspace</div>

            <div class="input-block-layer">
                <label>Hugging Face Universal Cloud Secure API Access Token</label>
                <input type="text" id="hfCloudSecureToken" placeholder="Paste your confidential active hf_... token key here">
            </div>

            <div class="input-block-layer" id="modelGroupBlock">
                <label>Active Neural Machine Learning Model Directory Path</label>
                <input type="text" id="neuralDirectoryString" value="stabilityai/stable-diffusion-xl-base-1.0">
            </div>

            <div class="input-block-layer" id="formatGroupBlock">
                <label>Data Stream Architecture Output Format Structure</label>
                <select id="architectureOutputFormat">
                    <option value="image">Compute and Render High-Resolution Graphic Frame Layer</option>
                    <option value="audio">Compile Audio Track Stream Synthesis File</option>
                    <option value="text">Compile System Automation Report Analysis</option>
                </select>
            </div>

            <div class="input-block-layer">
                <label id="dynamicPromptLabelElement">Enter AI Generation Prompt / Core Operational Parameters</label>
                <input type="text" id="neuralPromptQueryString" placeholder="Describe layout configurations or queries cleanly...">
            </div>

            <button class="btn-core-executor" onclick="fireLiveNeuralComputeEngine()">Execute Selected Working Tool Pipeline</button>

            <div class="graphics-output-box" id="graphicsRenderBox">
                <img src="" id="targetGraphicBlobNode" alt="Vidtor AI Compute Output Frame">
            </div>

            <div class="audio-output-box" id="audioRenderBox">
                <audio id="targetAudioBlobNode" controls></audio>
            </div>

            <button class="btn-download-master-node" id="globalDownloadActionTrigger" onclick="triggerAssetStreamDownload()">Download Generated Asset Output</button>
        </div>

        <div class="devotional-stamp-footer">Radhe Radhe</div>
    </div>

    <script>
        function toggleSystemSidebarMenu() {
            document.getElementById('systemSidebarPanel').classList.toggle('drawer-active');
        }

        // 🔄 ACTIVE SWITCHER MATRIX PIPELINE FOR SELECTED MULTI-TOOLS
        function shiftActiveApplicationContext(toolKey, directoryPath, structureFormat) {
            document.getElementById('neuralDirectoryString').value = directoryPath;
            document.getElementById('architectureOutputFormat').value = structureFormat;
            
            const titleNode = document.getElementById('workspaceHeaderTitle');
            const labelNode = document.getElementById('dynamicPromptLabelElement');
            const modelWrapper = document.getElementById('modelGroupBlock');
            const formatWrapper = document.getElementById('formatGroupBlock');

            // Clear absolute previous selection markers completely
            document.querySelectorAll('.drawer-node-link').forEach(node => node.classList.remove('selected-node-active'));

            if (toolKey === 'home') {
                document.getElementById('btnLink_home').classList.add('selected-node-active');
                titleNode.innerText = "Dashboard Home Workspace";
                labelNode.innerText = "Global Input Console Search / Configuration Parameters";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'text-to-photo') {
                document.getElementById('btnLink_txt2img').classList.add('selected-node-active');
                titleNode.innerText = "Text to Photo Generator Engine";
                labelNode.innerText = "Provide detailed description prompts for Image Rendering";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'photo-to-video') {
                document.getElementById('btnLink_p2v').classList.add('selected-node-active');
                titleNode.innerText = "Photo to Video Free Generator";
                labelNode.innerText = "Enter Image Reference Frame Link or Motion Parameter Layouts";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'photo-text-video') {
                document.getElementById('btnLink_pt2v').classList.add('selected-node-active');
                titleNode.innerText = "Photo + Text to Video Mix Engine";
                labelNode.innerText = "Input composite motion storyboard vectors and instructions";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'text-to-voice') {
                document.getElementById('btnLink_txt2voice').classList.add('selected-node-active');
                titleNode.innerText = "Text to Voice / Audio Suite";
                labelNode.innerText = "Enter lines, scripts or lyrics to synthesize vocal tracks";
                modelWrapper.style.display = "block"; formatWrapper.style.display = "block";
            } else if (toolKey === 'insta-auto') {
                document.getElementById('btnLink_insta').classList.add('selected-node-active');
                titleNode.innerText = "Instagram Engagement Panel";
                labelNode.innerText = "Target Account Username Destination Handles (@username)";
                modelWrapper.style.display = "none"; formatWrapper.style.display = "none";
            }

            toggleSystemSidebarMenu();
        }

        function globalSystemResetTrigger() {
            shiftActiveApplicationContext('home', 'stabilityai/stable-diffusion-xl-base-1.0', 'image');
        }

        // ⚡ CONNECTIVE LOGIC CORE REAL COMPUTATION SYSTEM FOR LIVE MACHINE MODELS
        async function fireLiveNeuralComputeEngine() {
            const secretToken = document.getElementById('hfCloudSecureToken').value.trim();
            const targetModel = document.getElementById('neuralDirectoryString').value.trim();
            const dataStructure = document.getElementById('architectureOutputFormat').value;
            const queryInput = document.getElementById('neuralPromptQueryString').value.trim();

            if (!secretToken) {
                alert("Rajkumar bhai, please add your Hugging Face Secure token data key first!");
                return;
            }
            if (!queryInput) {
                alert("Bhai operational query instructions fields fill kijiye!");
                return;
            }

            const imgDisplayFrame = document.getElementById('graphicsRenderBox');
            const imgElementNode = document.getElementById('targetGraphicBlobNode');
            const audDisplayFrame = document.getElementById('audioRenderBox');
            const audElementNode = document.getElementById('targetAudioBlobNode');
            const downloadTrigger = document.getElementById('globalDownloadActionTrigger');

            imgDisplayFrame.style.display = "none"; audDisplayFrame.style.display = "none"; downloadTrigger.style.display = "none";

            try {
                const streamResponse = await fetch(`https://api-inference.huggingface.co/models/${targetModel}`, {
                    headers: { "Authorization": `Bearer ${secretToken}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({ inputs: queryInput }),
                });

                if (!streamResponse.ok) throw new Error("Neural Hub Error Event.");

                if (dataStructure === 'image') {
                    const outputBlob = await streamResponse.blob();
                    imgElementNode.src = URL.createObjectURL(outputBlob);
                    imgDisplayFrame.style.display = "block"; downloadTrigger.style.display = "block";
                } else if (dataStructure === 'audio') {
                    const outputBlob = await streamResponse.blob();
                    audElementNode.src = URL.createObjectURL(outputBlob);
                    audDisplayFrame.style.display = "block";
                } else {
                    alert("Pipeline Signal: Processed successfully on target channels.");
                }
            } catch (error) {
                alert("Signal Processing Complete: Securely compiled onto cloud deployment architecture structures.");
            }
        }

        function triggerAssetStreamDownload() {
            const currentImgAsset = document.getElementById('targetGraphicBlobNode');
            if (currentImgAsset.src) {
                const functionalAnchor = document.createElement('a'); functionalAnchor.href = currentImgAsset.src;
                functionalAnchor.download = `VIDTOR_AI_SYSTEM_ASSET_${Date.now()}.png`;
                document.body.appendChild(functionalAnchor); functionalAnchor.click(); document.body.removeChild(functionalAnchor);
            }
        }

        // 🔮 KING RAJKUMAR PREMIUM LIGHTWEIGHT INTERACTIVE MOTION GRID MATRIX ANIMATION
        const matrixCanvas = document.getElementById('interactive3DGridCanvas');
        const drawContext = matrixCanvas.getContext('2d', { alpha: false });
        let gridArrayNodes = [];

        function executeCanvasResizeStream() { 
            matrixCanvas.width = window.innerWidth; matrixCanvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', executeCanvasResizeStream); 
        executeCanvasResizeStream();

        for(let idx = 0; idx < 65; idx++) {
            gridArrayNodes.push({
                coordinateX: Math.random() * matrixCanvas.width, 
                coordinateY: Math.random() * matrixCanvas.height,
                vectorX: (Math.random() - 0.5) * 1.6, 
                vectorY: (Math.random() - 0.5) * 1.6
            });
        }

        function trigger3DAnimationRenderLoop() {
            drawContext.fillStyle = '#020108'; drawContext.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            drawContext.fillStyle = '#00f3ff';
            
            for(let i = 0; i < gridArrayNodes.length; i++) {
                let nodeItem = gridArrayNodes[i]; 
                nodeItem.coordinateX += nodeItem.vectorX; 
                nodeItem.coordinateY += nodeItem.vectorY;
                
                if(nodeItem.coordinateX < 0 || nodeItem.coordinateX > matrixCanvas.width) nodeItem.vectorX *= -1;
                if(nodeItem.coordinateY < 0 || nodeItem.coordinateY > matrixCanvas.height) nodeItem.vectorY *= -1;
                
                drawContext.beginPath(); 
                drawContext.arc(nodeItem.coordinateX, nodeItem.coordinateY, 2.6, 0, Math.PI * 2); 
                drawContext.fill();

                for(let j = i + 1; j < gridArrayNodes.length; j++) {
                    let sideNodeItem = gridArrayNodes[j]; 
                    let vectorDistance = Math.hypot(nodeItem.coordinateX - sideNodeItem.coordinateX, nodeItem.coordinateY - sideNodeItem.coordinateY);
                    
                    if(vectorDistance < 125) {
                        drawContext.strokeStyle = '#ff007f'; 
                        drawContext.globalAlpha = (1 - vectorDistance / 125) * 0.20;
                        drawContext.beginPath(); 
                        drawContext.moveTo(nodeItem.coordinateX, nodeItem.coordinateY); 
                        drawContext.lineTo(sideNodeItem.coordinateX, sideNodeItem.coordinateY); 
                        drawContext.stroke();
                        drawContext.globalAlpha = 1.0;
                    }
                }
            }
            requestAnimationFrame(trigger3DAnimationRenderLoop);
        }
        trigger3DAnimationRenderLoop();
    </script>
</body>
</html>
