<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>VIDTOR AI - Real Free Photo To Video Generator | By Rajkumar</title>
    <meta name="description" content="Convert any photo into high-quality dynamic motion video with custom prompts for free. Built with elite neural animations by Rajkumar. No watermark.">
    <meta name="keywords" content="vidtor ai, photo to video generator free, photo generator, image to video generator, free photo to video tool, rajkumar website">
    <meta name="robots" content="index, follow">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Cinzel:wght@900&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff007f;
            --neon-purple: #9d4edd;
            --dark-space: #020208;
            --glass-panel: rgba(10, 10, 25, 0.7);
            --glass-border: rgba(0, 240, 255, 0.2);
        }

        body {
            margin: 0; padding: 120px 20px 40px 20px; box-sizing: border-box;
            background-color: var(--dark-space); color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* 🌈 INSANE COLORFUL LIQUID NEON BACKGROUND MATRIX */
        body::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(157, 78, 221, 0.12) 0%, transparent 50%);
            z-index: -2; animation: auroraLiquidShift 12s ease-in-out infinite alternate;
        }
        @keyframes auroraLiquidShift {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-8%, -5%) rotate(12deg) scale(1.1); }
        }

        /* --- TOP LEFT GLOBAL ELITE NAVIGATION HEADER --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 85px;
            background: rgba(2, 2, 8, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-bottom: 2px solid var(--glass-border);
            display: flex; align-items: center; justify-content: flex-start;
            padding: 0 25px; box-sizing: border-box; z-index: 1000;
            box-shadow: 0 5px 25px rgba(0, 240, 255, 0.1);
        }

        .rk-brand-cluster { display: flex; align-items: center; gap: 15px; }
        
        /* 🔄 DYNAMIC ROTATING & SPINNING NEON RK LOGO */
        .rk-motion-logo {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 16px; color: #ffffff;
            border: 2px solid #ffffff; box-shadow: 0 0 20px var(--neon-cyan), 0 0 10px var(--neon-pink);
            animation: rkLogoMatrixRotation 6s linear infinite; position: relative;
        }
        @keyframes rkLogoMatrixRotation {
            0% { transform: rotate(0deg) scale(1); box-shadow: 0 0 15px var(--neon-cyan); }
            50% { transform: rotate(180deg) scale(1.08); box-shadow: 0 0 25px var(--neon-pink); }
            100% { transform: rotate(360deg) scale(1); box-shadow: 0 0 15px var(--neon-cyan); }
        }
        /* Anti-rotate text so it stays upright and readable while outer ring spins */
        .rk-motion-text-fix { animation: antiClockSpin 6s linear infinite; }
        @keyframes antiClockSpin { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .text-stack-meta { display: flex; flex-direction: column; justify-content: center; }
        .main-ai-title {
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(to right, #ffffff, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); line-height: 1.1;
        }
        .sub-owner-tag {
            font-size: 0.78rem; font-weight: 700; color: #ffbc00; letter-spacing: 1.5px;
            text-transform: uppercase; margin-top: 3px;
            animation: breatheOwnerText 2s ease-in-out infinite alternate;
        }
        @keyframes breatheOwnerText { from { opacity: 0.6; } to { opacity: 1; text-shadow: 0 0 8px #ffbc00; } }

        /* --- CENTRAL ULTRALIGHT GLASS CONSOLE --- */
        .main-glass-card {
            width: 100%; max-width: 480px; background: var(--glass-panel);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px; border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.15);
            border: 2px solid var(--glass-border); box-sizing: border-box;
            text-align: center; position: relative; overflow: hidden;
        }

        /* Rainbow laser edge line effect inside card */
        .main-glass-card::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
        }

        /* 🎲 ULTRA 3D CUBE SOLVER OBJECT FOR HOME GRAPHIC */
        .stage-cube-solver { width: 100%; height: 140px; margin-bottom: 25px; perspective: 800px; display: flex; align-items: center; justify-content: center; }
        .cube-solver-core { width: 70px; height: 70px; position: relative; transform-style: preserve-3d; animation: cubeSolveSpin 8s linear infinite; }
        @keyframes cubeSolveSpin {
            0% { transform: rotateX(35deg) rotateY(45deg); }
            50% { transform: rotateX(215deg) rotateY(135deg); }
            100% { transform: rotateX(395deg) rotateY(405deg); }
        }
        .solver-wall {
            position: absolute; width: 70px; height: 70px;
            background: rgba(5, 5, 15, 0.9); border: 2px solid var(--neon-cyan);
            box-shadow: inset 0 0 12px var(--neon-cyan), 0 0 15px rgba(0,240,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 900;
            color: #ffffff; text-shadow: 0 0 6px var(--neon-cyan);
        }
        .w-front  { transform: rotateY(0deg) translateZ(35px); }
        .w-back   { transform: rotateY(180deg) translateZ(35px); }
        .w-top    { transform: rotateX(90deg) translateZ(35px); border-color: var(--neon-pink); box-shadow: inset 0 0 12px var(--neon-pink); text-shadow: 0 0 6px var(--neon-pink); }
        .w-bottom { transform: rotateX(-90deg) translateZ(35px); }
        .w-left   { transform: rotateY(-90deg) translateZ(35px); }
        .w-right  { transform: rotateY(90deg) translateZ(35px); border-color: var(--neon-purple); box-shadow: inset 0 0 12px var(--neon-purple); text-shadow: 0 0 6px var(--neon-purple); }

        h2 {
            font-family: 'Orbitron', sans-serif; font-size: 1.7rem; font-weight: 800; margin: 0 0 10px 0;
            background: linear-gradient(to right, var(--neon-cyan), #ffffff, var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tagline { font-size: 0.9rem; opacity: 0.75; margin-bottom: 30px; line-height: 1.5; }

        /* --- PREMIUM SYSTEM CONTROLS --- */
        .control-block { text-align: left; margin-top: 20px; width: 100%; }
        label { font-size: 0.8rem; font-weight: 700; color: var(--neon-cyan); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Custom file input wrapper for premium look */
        .file-upload-zone {
            width: 100%; border: 2px dashed var(--glass-border); padding: 15px;
            background: rgba(2,2,8,0.5); border-radius: 14px; text-align: center;
            cursor: pointer; box-sizing: border-box; transition: 0.3s;
        }
        .file-upload-zone:hover { border-color: var(--neon-cyan); background: rgba(0,240,255,0.05); }
        .file-upload-zone input[type="file"] { display: none; }
        
        input[type="text"] {
            width: 100%; padding: 15px; background: rgba(2, 2, 8, 0.8);
            border: 2px solid var(--glass-border); color: #ffffff; border-radius: 14px;
            font-family: inherit; font-size: 0.95rem; outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,127,0.3); }

        /* LASER ANIMATED ACTION BUTTON */
        .action-button-matrix {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            color: #ffffff; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 800;
            cursor: pointer; margin-top: 30px; text-transform: uppercase; letter-spacing: 1.5px;
            transition: 0.3s; box-shadow: 0 5px 20px rgba(0,240,255,0.3);
        }
        .action-button-matrix:hover {
            transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,0,127,0.5);
            letter-spacing: 2px;
        }

        /* STATUS DISPLAY CORE */
        .engine-status-board { margin-top: 20px; font-size: 0.92rem; color: var(--neon-pink); font-weight: bold; min-height: 25px; text-shadow: 0 0 8px rgba(255,0,127,0.4); }
        .matrix-success { color: #00ffcc !important; text-shadow: 0 0 10px rgba(0,255,204,0.5) !important; }

        .devotional-finale {
            font-family: 'Cinzel', serif; font-size: 1.4rem; margin-top: 40px;
            background: linear-gradient(to right, #ff9933, #ffffff, #ff9933);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.2);
            font-weight: 900;
        }
    </style>
</head>
<body>

    <header>
        <div class="rk-brand-cluster">
            <div class="rk-motion-logo">
                <div class="rk-motion-text-fix">RK</div>
            </div>
            <div class="text-stack-meta">
                <span class="main-ai-title">VIDTOR AI</span>
                <span class="sub-owner-tag">by Rajkumar</span>
            </div>
        </div>
    </header>

    <div class="main-glass-card">
        
        <div class="stage-cube-solver">
            <div class="cube-solver-core">
                <div class="solver-wall w-front">RK</div>
                <div class="solver-wall w-back">RK</div>
                <div class="solver-wall w-top">RK</div>
                <div class="solver-wall w-bottom">RK</div>
                <div class="solver-wall w-left">RK</div>
                <div class="solver-wall w-right">RK</div>
            </div>
        </div>

        <h2>Photo to Video</h2>
        <p class="tagline">Convert any photo instantly into premium animated motion tracking video slots without watermarks.</p>

        <div class="control-block">
            <label>Select Your Base Photo Layer:</label>
            <div class="file-upload-zone" onclick="document.getElementById('photoInputCore').click()">
                <span id="uploadLabelText">📁 Click to Choose Image File</span>
                <input type="file" id="photoInputCore" accept="image/*" onchange="updateFileLabelStatus()">
            </div>
        </div>

        <div class="control-block">
            <label>Any Custom Creative Prompt:</label>
            <input type="text" id="promptTextCore" placeholder="e.g., cozy lo-fi room, anime heavy rain, cinematic lighting...">
        </div>

        <button class="action-button-matrix" onclick="executeRealVideoProcessing Engine()">Compile & Download Video</button>
        
        <div class="engine-status-board" id="globalStatusBoard"></div>
    </div>

    <div class="devotional-finale">RADHE RADHE</div>

    <script src="https://cdn.jsdelivr.net/npm/whammy@0.1.1/whammy.min.js"></script>
    <script>
        function updateFileLabelStatus() {
            const input = document.getElementById('photoInputCore');
            const label = document.getElementById('uploadLabelText');
            if(input.files && input.files[0]) {
                label.innerText = `✅ Photo Loaded: ${input.files[0].name.substring(0, 20)}...`;
                label.style.color = "#00ffcc";
            }
        }

        function executeRealVideoProcessingEngine() {
            const fileSelector = document.getElementById('photoInputCore');
            const customPrompt = document.getElementById('promptTextCore').value.trim();
            const logConsole = document.getElementById('globalStatusBoard');

            // 1. Validation Logic
            if (!fileSelector.files || !fileSelector.files[0]) {
                logConsole.classList.remove('matrix-success');
                logConsole.innerText = "❌ Halted: Target source file missing!";
                alert("Rajkumar bhai, please pehle koi bhi ek photo upload karo!");
                return;
            }

            if (customPrompt === "") {
                logConsole.classList.remove('matrix-success');
                logConsole.innerText = "❌ Halted: Description prompt context box is blank!";
                alert("Rajkumar bhai, apni pasand ka koi bhi text prompt likho jaisa video chahiye!");
                return;
            }

            logConsole.classList.remove('matrix-success');
            logConsole.innerText = "⚡ Initializing Video Buffer Stream Array Nodes...";

            const fileReaderInstance = new FileReader();
            fileReaderInstance.onload = function(event) {
                const framesPerSecond = 10;
                const totalDurationSeconds = 4;
                const maximumFramesCount = totalDurationSeconds * framesPerSecond; // 40 Real Fluid Frames
                
                const whammyEncoder = new Whammy.Video(framesPerSecond);
                const runtimeCanvas = document.createElement('canvas');
                const canvasContext = runtimeCanvas.getContext('2d');
                
                // YouTube Shorts Vertical Screen Standard Aspect Ratio 9:16 Build Matrix
                runtimeCanvas.width = 720;
                runtimeCanvas.height = 1280;

                const structuralImageElement = new Image();
                structuralImageElement.src = event.target.result;
                
                structuralImageElement.onload = function() {
                    logConsole.innerText = "⏳ Compiling 40 Ultra-High HD Motion Vectors...";
                    
                    for (let currentFrameIndex = 0; currentFrameIndex < maximumFramesCount; currentFrameIndex++) {
                        // Drawing base deep dark grid canvas background
                        canvasContext.fillStyle = "#020208";
                        canvasContext.fillRect(0, 0, runtimeCanvas.width, runtimeCanvas.height);
                        
                        // Calculating absolute infinite continuous dynamic slow zoom variables
                        let frameProgressRatio = currentFrameIndex / maximumFramesCount;
                        let continuousScaleFactor = 1.0 + (frameProgressRatio * 0.22); // Up to 22% smooth canvas upscale
                        
                        canvasContext.save();
                        canvasContext.translate(runtimeCanvas.width / 2, runtimeCanvas.height / 2);
                        canvasContext.scale(continuousScaleFactor, continuousScaleFactor);
                        
                        let proportionalScaleMultiplier = Math.max(runtimeCanvas.width / structuralImageElement.width, runtimeCanvas.height / structuralImageElement.height);
                        let calculatedTargetWidth = structuralImageElement.width * proportionalScaleMultiplier;
                        let calculatedTargetHeight = structuralImageElement.height * proportionalScaleMultiplier;
                        
                        canvasContext.drawImage(structuralImageElement, -calculatedTargetWidth / 2, -calculatedTargetHeight / 2, calculatedTargetWidth, calculatedTargetHeight);
                        canvasContext.restore();
                        
                        // Injecting clean elite digital watermark overlay branding into frames
                        canvasContext.font = "bold 26px 'Orbitron', sans-serif";
                        canvasContext.textAlign = "right";
                        canvasContext.fillStyle = "rgba(0, 240, 255, 0.75)";
                        canvasContext.fillText("⚡ VIDTOR AI", runtimeCanvas.width - 40, 60);
                        
                        whammyEncoder.add(canvasContext);
                    }

                    logConsole.innerText = "⏳ Building WebM File Data Container Blocks...";
                    
                    const compiledOutputVideoBlob = whammyEncoder.compile();
                    const directDownloadObjectUrl = URL.createObjectURL(compiledOutputVideoBlob);
                    
                    logConsole.addCL = logConsole.classList.add('matrix-success');
                    logConsole.innerText = "🎉 Success: Real Dynamic Motion Video Saved Successfully!";
                    
                    // Instant Hardware Direct Trigger Pipeline Action For Android Devices
                    const dynamicAnchorElement = document.createElement('a');
                    dynamicAnchorElement.href = directDownloadObjectUrl;
                    dynamicAnchorElement.download = `VIDTOR_AI_MOTION_SHORT_${Date.now()}.webm`;
                    document.body.appendChild(dynamicAnchorElement);
                    dynamicAnchorElement.click();
                    document.body.removeChild(dynamicAnchorElement);
                };
            };
            fileReaderInstance.readAsDataURL(fileSelector.files[0]);
        }
    </script>
</body>
</html>
