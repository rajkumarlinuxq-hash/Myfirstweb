<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDTOR AI BY RAJKUMAR</title>
    <!-- Modern & Spiritual Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050811;
            --card: #0d1527;
            --blue: #00d2ff;
            --purple: #9d4edd;
            --text: #f3f4f6;
        }

        body {
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIRI STYLE LIVE GLOWING LOGO ENGINE --- */
        .siri-logo-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .siri-pulse {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--blue), var(--purple), #ff007f);
            filter: blur(12px);
            opacity: 0.8;
            animation: siri-wave 3s ease-in-out infinite alternate;
        }

        .siri-pulse-2 {
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: linear-gradient(225deg, #00ffcc, var(--purple), var(--blue));
            filter: blur(18px);
            opacity: 0.6;
            animation: siri-wave 2.2s ease-in-out infinite alternate-reverse;
        }

        .siri-core {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 5;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2), 0 0 20px rgba(0, 210, 255, 0.5);
            animation: core-bounce 4s ease-in-out infinite alternate;
        }

        @keyframes siri-wave {
            0% {
                transform: scale(0.9) rotate(0deg);
                border-radius: 40% 60% 50% 50% / 50% 40% 60% 50%;
            }
            50% {
                transform: scale(1.15) rotate(180deg);
                border-radius: 60% 40% 60% 40% / 40% 60% 40% 60%;
            }
            100% {
                transform: scale(0.95) rotate(360deg);
                border-radius: 40% 60% 40% 50% / 50% 50% 50% 40%;
            }
        }

        @keyframes core-bounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); filter: drop-shadow(0 0 8px var(--blue)); }
        }

        /* --- APP CONTAINER STYLE --- */
        .app-container {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 800;
            font-size: 2.8rem;
            margin: 5px 0 0 0;
            background: linear-gradient(to right, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .author {
            color: var(--purple);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 4px;
            margin-bottom: 25px;
        }

        .upload-box {
            width: 100%;
            border: 2px dashed rgba(0, 210, 255, 0.3);
            padding: 30px 0;
            border-radius: 18px;
            cursor: pointer;
            background: rgba(0, 210, 255, 0.01);
            transition: 0.3s;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .upload-box:hover {
            border-color: var(--blue);
            background: rgba(0, 210, 255, 0.04);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        #preview-box {
            margin-bottom: 20px;
        }

        .preview-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid var(--blue);
        }

        .field-group {
            width: 100%;
            text-align: left;
            margin-top: 15px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--blue);
            display: block;
            margin-bottom: 6px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 13px;
            background: #050811;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--blue);
        }

        .generate-box {
            width: 100%;
            margin-top: 25px;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(157, 78, 221, 0.3);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(157, 78, 221, 0.5);
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #00ffcc;
            font-weight: bold;
        }

        .footer-branding {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            margin-top: 25px;
            background: linear-gradient(to right, #ff9933, #ffffff, #ff9933);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            opacity: 0.9;
            filter: drop-shadow(0 0 5px rgba(255, 153, 51, 0.3));
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- LIVE ANIMATED SIRI LOGO INTERFACE -->
    <div class="siri-logo-container">
        <div class="siri-pulse"></div>
        <div class="siri-pulse-2"></div>
        <div class="siri-core">🤖</div>
    </div>

    <h1>VIDTOR AI</h1>
    <div class="author">BY RAJKUMAR</div>

    <!-- 1. PHOTO UPLOAD BOX -->
    <div class="upload-box" onclick="document.getElementById('photoInput').click()">
        <div class="upload-icon">📸</div>
        <div style="font-weight: 600;">Photo Upload Karein</div>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="loadPhoto(this)">
    </div>

    <div id="preview-box"></div>

    <!-- 2. AI PROMPT BOX -->
    <div class="field-group">
        <label>🎬 AI Video Prompt:</label>
        <input type="text" id="promptInput" placeholder="e.g., Slow Cinematic Zoom, Left Pan, Aesthetic Look...">
    </div>

    <!-- Video Length -->
    <div class="field-group">
        <label>⏱️ Video Duration:</label>
        <select id="durationInput">
            <option value="4" selected>4 Seconds</option>
            <option value="7">7 Seconds</option>
        </select>
    </div>

    <!-- 3. GENERATOR BOX -->
    <div class="generate-box">
        <button class="btn-generate" onclick="startAiGeneration()">Generate AI Video</button>
        <div class="status-msg" id="statusLabel"></div>
    </div>
</div>

<!-- Footer Radhe Radhe -->
<div class="footer-branding">
    RADHE RADHE
</div>

<!-- Whammy Video Compiler -->
<script src="https://cdn.jsdelivr.net/npm/whammy@0.1.1/whammy.min.js"></script>
<script>
    let uploadedImgData = null;

    function loadPhoto(input) {
        const preview = document.getElementById('preview-box');
        preview.innerHTML = '';
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImgData = e.target.result;
                const img = document.createElement('img');
                img.src = e.target.result;
                img.classList.add('preview-img');
                preview.appendChild(img);
                document.getElementById('statusLabel').innerText = "Photo select ho gayi! Ab generator chalu karein.";
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function startAiGeneration() {
        if (!uploadedImgData) {
            alert('Rajkumar bhai, pehle photo upload karo!');
            return;
        }

        const statusLabel = document.getElementById('statusLabel');
        statusLabel.innerText = '⚡ AI Video Engine Processing...';

        const promptText = document.getElementById('promptInput').value.toLowerCase();
        const duration = parseInt(document.getElementById('durationInput').value);
        
        const fps = 12;
        const totalFrames = duration * fps;
        const video = new Whammy.Video(fps);
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1280;
        canvas.height = 720;
        
        const mainImg = new Image();
        mainImg.src = uploadedImgData;
        
        mainImg.onload = function() {
            const textFramesCount = Math.floor(1.5 * fps); 
            const motionFramesCount = totalFrames - textFramesCount;

            // Part 1: Image Animation + Continuous Logo Motion Loop
            for (let i = 0; i < motionFramesCount; i++) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let progress = i / motionFramesCount;
                
                let zoom = 1.0 + (progress * 0.15); 
                let moveX = 0;
                
                if (promptText.includes('left')) moveX = -progress * 50;
                if (promptText.includes('right')) moveX = progress * 50;

                ctx.save();
                ctx.translate(canvas.width / 2 + moveX, canvas.height / 2);
                ctx.scale(zoom, zoom);
                
                let scale = Math.max(canvas.width / mainImg.width, canvas.height / mainImg.height);
                let w = mainImg.width * scale;
                let h = mainImg.height * scale;
                ctx.drawImage(mainImg, -w/2, -h/2, w, h);
                ctx.restore();
                
                // --- CONTINUOUS ANIMATED WATERMARK LOGO ENGINE ---
                ctx.save();
                let logoYOffset = Math.sin(i * 0.4) * 8; 
                ctx.font = "bold 24px 'Plus Jakarta Sans', sans-serif";
                ctx.textAlign = "right";
                ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 4;
                ctx.fillText("⚡ VIDTOR AI", canvas.width - 40, 50 + logoYOffset);
                ctx.restore();
                
                video.add(canvas);
            }

            // Part 2: END SCREEN - RADHE RADHE OUTRO
            for (let j = 0; j < textFramesCount; j++) {
                ctx.fillStyle = "#050811";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.font = "bold 75px 'Cinzel', serif";
                ctx.textAlign = "center";
                
                let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, "#ff9933");
                gradient.addColorStop(0.5, "#ffffff");
                gradient.addColorStop(1, "#ff9933");
                ctx.fillStyle = gradient;
                
                let alpha = Math.min(j / (fps * 0.5), 1);
                ctx.globalAlpha = alpha;
                
                ctx.fillText("RADHE RADHE", canvas.width / 2, canvas.height / 2 + 20);
                ctx.globalAlpha = 1.0; 
                
                video.add(canvas);
            }

            // Compile & Auto Download
            const outputVideo = video.compile();
            const outputUrl = URL.createObjectURL(outputVideo);
            
            statusLabel.innerText = '🎉 Video Downloaded Successfully!';
            
            const downloader = document.createElement('a');
            downloader.href = outputUrl;
            downloader.download = `VIDTOR_AI_RAJKUMAR_${Date.now()}.webm`;
            document.body.appendChild(downloader);
            downloader.click();
            document.body.removeChild(downloader);
        }
    }
</script>

</body>
</html>
